<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{adminTitle}}</title>
    <style>
      :root {
        --wa-green: #25d366;
        --wa-green-dark: #128c7e;
        --wa-deep: #075e54;
        --wa-bg: #e5ddd5;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #5f6b7a;
        --border: #d8dee6;
      }
      body {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        margin: 0;
        background: linear-gradient(180deg, #f2f7f5 0%, var(--wa-bg) 100%);
        color: var(--text);
      }
      * {
        box-sizing: border-box;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      .sidebar {
        background: linear-gradient(180deg, var(--wa-deep) 0%, var(--wa-green-dark) 100%);
        color: #fff;
        padding: 22px 16px;
        box-shadow: 6px 0 24px rgba(7, 94, 84, 0.18);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .brand-logo {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: var(--wa-green);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #093;
        border: 2px solid rgba(255, 255, 255, 0.75);
      }
      .brand h1 {
        font-size: 16px;
        margin: 0;
        line-height: 1.2;
      }
      .brand p {
        margin: 2px 0 0;
        opacity: 0.9;
        font-size: 12px;
      }
      .hotel-card {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 18px;
      }
      .hotel-card strong {
        display: block;
        font-size: 13px;
      }
      .hotel-card span {
        font-size: 12px;
        opacity: 0.92;
      }
      .lang-switcher {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .lang-switcher a {
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.1);
      }
      .lang-switcher a.active {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
        font-weight: 700;
      }
      nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      nav a,
      nav button {
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        padding: 10px 12px;
        text-align: left;
        font-size: 14px;
        cursor: pointer;
      }
      nav a:hover,
      nav button:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      nav form {
        margin: 0;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
      }
      .sidebar-nav {
        flex: 1;
      }
      .sidebar-logout {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }
      .top-level-link {
        font-weight: 700;
      }
      nav a.top-level-active {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
      }
      nav a.active-link {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
        font-weight: 700;
      }
      .top-subnav {
        margin: 0 0 12px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #f7faf9;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        align-items: flex-start;
      }
      .top-subnav-main {
        flex: 1;
        min-width: 0;
      }
      .admin-notif-wrap {
        position: relative;
        flex: 0 0 auto;
      }
      .admin-notif-bell {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 999px;
        width: 38px;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 17px;
      }
      .admin-notif-badge {
        position: absolute;
        top: -5px;
        right: -4px;
        min-width: 18px;
        height: 18px;
        border-radius: 999px;
        padding: 0 5px;
        font-size: 11px;
        line-height: 18px;
        text-align: center;
        background: #ef4444;
        color: #fff;
        font-weight: 700;
      }
      .admin-notif-panel {
        position: absolute;
        top: 44px;
        right: 0;
        width: min(360px, calc(100vw - 40px));
        max-height: 420px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.15);
        z-index: 10020;
      }
      /* Ensure the notification dropdown never intercepts clicks when closed (hidden attr alone can miss edge cases). */
      #adminNotifPanel[hidden],
      .admin-notif-panel[hidden] {
        display: none !important;
        visibility: hidden;
        pointer-events: none !important;
      }
      .admin-notif-panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }
      .admin-notif-actions {
        display: flex;
        gap: 6px;
      }
      .admin-notif-actions button {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        padding: 3px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .admin-notif-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .admin-notif-item a {
        display: block;
        padding: 10px 12px;
        text-decoration: none;
        color: var(--text);
        border-left: 4px solid transparent;
        border-bottom: 1px solid #eef2f7;
      }
      .admin-notif-item:last-child a {
        border-bottom: 0;
      }
      .admin-notif-item.sev-critical a { border-left-color: #dc2626; background: #fef2f2; }
      .admin-notif-item.sev-high a { border-left-color: #f59e0b; background: #fffbeb; }
      .admin-notif-item.sev-normal a { border-left-color: #0b6e6e; }
      .admin-notif-item.sev-info a { border-left-color: #64748b; }
      .admin-notif-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
      .admin-notif-body { font-size: 12px; color: var(--muted); line-height: 1.35; }
      .admin-notif-empty {
        font-size: 12px;
        color: var(--muted);
        padding: 12px;
      }
      .attention-strip {
        margin: 0 0 12px;
        border: 1px solid #fecaca;
        background: #fff5f5;
        border-radius: 12px;
        padding: 10px 12px;
      }
      .attention-strip h4 {
        margin: 0 0 8px;
        font-size: 13px;
      }
      .attention-strip ul {
        margin: 0;
        padding-left: 18px;
      }
      .attention-strip li {
        margin: 4px 0;
        font-size: 13px;
      }
      .section-tabs {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
      }
      .section-tabs.active {
        display: flex;
      }
      .section-tabs a {
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--wa-deep);
        background: #fff;
        font-size: 13px;
        font-weight: 600;
      }
      .section-tabs a.active-link {
        background: var(--wa-green);
        border-color: transparent;
        color: #083d2d;
      }
      .section-tabs .nav-tab-placeholder {
        display: inline-block;
        border: 1px dashed var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--muted);
        background: rgba(248, 250, 249, 0.95);
        font-size: 13px;
        font-weight: 600;
        cursor: default;
        user-select: none;
      }
      .content {
        padding: 24px;
        min-width: 0;
      }
      .admin-toast-stack {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(380px, calc(100vw - 32px));
        pointer-events: none;
      }
      .admin-toast {
        pointer-events: auto;
        background: #fff;
        border: 1px solid var(--border);
        border-left: 4px solid var(--wa-deep);
        border-radius: 10px;
        padding: 10px 12px;
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
        animation: adminToastIn 0.25s ease-out;
      }
      .admin-toast-booking {
        border-left-color: #b45309;
        background: #fffbeb;
      }
      .admin-toast-title {
        display: block;
        font-size: 13px;
        margin: 0 0 4px;
        color: var(--text);
      }
      .admin-toast-body {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
        max-height: 4.2em;
        overflow: hidden;
      }
      .admin-toast-out {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      @keyframes adminToastIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .nav-live-badge {
        display: inline-block;
        min-width: 1.1em;
        padding: 1px 6px;
        margin-left: 4px;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.3;
        border-radius: 999px;
        background: #fbbf24;
        color: #422006;
        vertical-align: middle;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
        padding: 22px;
        overflow-x: auto;
      }
      h2 {
        margin-top: 0;
      }
      h3 {
        margin-top: 0;
      }
      .muted {
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 12px;
      }
      .btn-link {
        display: inline-block;
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f7faf9;
        color: var(--wa-deep);
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
      }
      .btn-link.primary {
        background: var(--wa-green);
        border-color: transparent;
        color: #083d2d;
      }
      .inline-link {
        color: var(--wa-deep);
        text-underline-offset: 2px;
      }
      .stat-link {
        color: inherit;
        text-decoration: none;
      }
      .stat-link:hover {
        text-decoration: underline;
      }
      .timeline {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .bubble {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        max-width: min(760px, 100%);
      }
      .bubble.inbound {
        justify-self: start;
        background: #f8fafc;
      }
      .bubble.outbound {
        justify-self: end;
        background: #dcfce7;
      }
      .bubble-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .bubble-body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.45;
      }
      .bubble-meta {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .stat {
        border: 1px solid var(--border);
        border-left: 6px solid var(--wa-green);
        border-radius: 12px;
        padding: 12px;
      }
      .stat h3 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }
      .stat p {
        margin: 8px 0 0;
        font-size: 22px;
        font-weight: 700;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        min-width: 560px;
      }
      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        font-size: 13px;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge.ok {
        background: #dcfce7;
        color: #166534;
      }
      .badge.pending {
        background: #fef9c3;
        color: #854d0e;
      }
      .badge.alert {
        background: #fee2e2;
        color: #991b1b;
      }
      html[dir="rtl"] body {
        text-align: right;
      }
      html[dir="rtl"] .shell {
        grid-template-columns: 1fr 280px;
      }
      html[dir="rtl"] .sidebar {
        order: 2;
        box-shadow: -6px 0 24px rgba(7, 94, 84, 0.18);
      }
      html[dir="rtl"] .content {
        order: 1;
      }
      html[dir="rtl"] .lang-switcher {
        justify-content: flex-end;
      }
      html[dir="rtl"] nav a,
      html[dir="rtl"] nav button {
        text-align: right;
      }
      html[dir="rtl"] th,
      html[dir="rtl"] td {
        text-align: right;
      }
      html[dir="rtl"] .actions {
        justify-content: flex-end;
      }
      html[dir="rtl"] .section-tabs {
        justify-content: flex-end;
      }
      html[dir="rtl"] .bubble.inbound {
        justify-self: end;
      }
      html[dir="rtl"] .bubble.outbound {
        justify-self: start;
      }
      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .grid-4,
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .sidebar {
          padding: 14px 12px;
          box-shadow: 0 6px 24px rgba(7, 94, 84, 0.18);
        }
        .brand {
          margin-bottom: 12px;
        }
        .hotel-card {
          margin-bottom: 12px;
        }
        nav {
          flex-direction: row;
          overflow-x: auto;
          gap: 8px;
          padding-bottom: 4px;
        }
        nav a,
        nav button {
          white-space: nowrap;
          flex: 0 0 auto;
        }
        .content {
          padding: 14px;
        }
        .panel {
          padding: 14px;
          border-radius: 12px;
        }
      }
      @media (max-width: 640px) {
        .brand-logo {
          width: 40px;
          height: 40px;
        }
        .brand h1 {
          font-size: 15px;
        }
        .brand p {
          font-size: 11px;
        }
        .stat p {
          font-size: 20px;
        }
      }
      @media (max-width: 480px) {
        table {
          min-width: 100%;
          border-collapse: separate;
          border-spacing: 0;
        }
        thead {
          display: none;
        }
        tbody tr {
          display: block;
          margin-bottom: 10px;
          padding: 10px;
          border: 1px solid var(--border);
          border-radius: 12px;
          background: #fff;
        }
        tbody td {
          display: block;
          text-align: right;
          border-bottom: 1px dashed var(--border);
          padding: 8px 0;
          min-height: 22px;
        }
        tbody td:last-child {
          border-bottom: 0;
        }
        tbody td::before {
          content: attr(data-label);
          float: left;
          color: var(--muted);
          font-weight: 600;
          text-align: left;
          padding-right: 10px;
        }
        html[dir="rtl"] tbody td {
          text-align: left;
        }
        html[dir="rtl"] tbody td::before {
          float: right;
          text-align: right;
          padding-right: 0;
          padding-left: 10px;
        }
        tbody th {
          display: block;
          border-bottom: 0;
          padding: 0 0 4px;
          color: var(--muted);
          font-size: 12px;
          font-weight: 600;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-logo">WS</div>
          <div>
            <h1>{{adminTitle}}</h1>
            <p>{{brandTagline}}</p>
          </div>
        </div>
        <div class="lang-switcher">{{langSwitcher}}</div>
        <div class="hotel-card">
          <strong>{{hotelName}}</strong>
          <span>{{hotelSign}}</span>
        </div>
        <nav class="sidebar-nav">{{navLinks}}</nav>
        <div class="sidebar-logout">{{logoutAction}}</div>
      </aside>
      <main class="content">
        <div class="top-subnav">
          <div class="top-subnav-main">{{sectionTabs}}</div>
          <div class="admin-notif-wrap">
            <button id="adminNotifBell" class="admin-notif-bell" type="button" title="Notifications">🔔</button>
            <span id="adminNotifBadge" class="admin-notif-badge" hidden>0</span>
            <div id="adminNotifPanel" class="admin-notif-panel" hidden>
              <div class="admin-notif-panel-head">
                <strong style="font-size:13px">Notifications</strong>
                <div class="admin-notif-actions">
                  <button id="adminNotifMute" type="button" title="Mute alert sound">🔔</button>
                  <button id="adminNotifReadAll" type="button">Read all</button>
                </div>
              </div>
              <ul id="adminNotifList" class="admin-notif-list"></ul>
              <p id="adminNotifEmpty" class="admin-notif-empty">No new notifications.</p>
            </div>
          </div>
        </div>
        <section id="adminAttentionStrip" class="attention-strip" hidden>
          <h4>Attention Needed</h4>
          <ul id="adminAttentionList"></ul>
        </section>
        <section class="panel">{{content}}</section>
      </main>
    </div>
    <script>
      (function () {
        const cookieName = "chatastay_lang";
        const query = new URLSearchParams(window.location.search);
        const queryLang = query.get("lang");
        if (queryLang === "en" || queryLang === "ar") {
          document.cookie = `${cookieName}=${queryLang}; Path=/; Max-Age=31536000; SameSite=Lax`;
          query.delete("lang");
          const next = `${window.location.pathname}${query.toString() ? `?${query.toString()}` : ""}${window.location.hash}`;
          window.location.replace(next);
          return;
        }

        const cookieMatch = document.cookie.match(new RegExp(`(?:^|; )${cookieName}=([^;]+)`));
        const lang = cookieMatch?.[1] === "ar" ? "ar" : "en";
        document.documentElement.setAttribute("lang", lang);
        document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

        document.querySelectorAll("[data-lang-link]").forEach((link) => {
          if (link.getAttribute("data-lang-link") === lang) {
            link.classList.add("active");
          }
        });

        const normalizePath = (href) => {
          if (!href) return "";
          try {
            const u = new URL(href, window.location.origin);
            return u.pathname.replace(/\/+$/, "") || "/";
          } catch {
            return "";
          }
        };
        const currentPath = (window.location.pathname || "/").replace(/\/+$/, "") || "/";
        const groupByPath = (path) => {
          if (path === "/admin/profile") return "dashboard";
          if (
            path.startsWith("/admin/users") ||
            path.startsWith("/admin/subscription") ||
            path.startsWith("/admin/billing") ||
            path.startsWith("/admin/integrations") ||
            path.startsWith("/admin/setup")
          )
            return "account";
          if (
            path.startsWith("/admin/reports") ||
            path.startsWith("/admin/management-kpi") ||
            path.startsWith("/admin/daily-digest") ||
            path.startsWith("/admin/ai-analytics") ||
            path.startsWith("/admin/booking-funnel") ||
            path.startsWith("/admin/routing-health")
          )
            return "insights";
          if (
            path.startsWith("/admin/fb") ||
            path.startsWith("/admin/restaurant-ops") ||
            path.startsWith("/admin/outlet-dashboard") ||
            path.startsWith("/admin/outlet-orders")
          )
            return "fb";
          if (path.startsWith("/admin/conversations") || path.startsWith("/admin/campaigns")) return "comms";
          if (
            path.startsWith("/admin/bookings") ||
            path.startsWith("/admin/calendar") ||
            path.startsWith("/admin/inventory") ||
            path.startsWith("/admin/offers") ||
            path.startsWith("/admin/guests")
          )
            return "reservations";
          if (
            path.startsWith("/admin/rooms") ||
            path.startsWith("/admin/room-board") ||
            path.startsWith("/admin/housekeeping") ||
            path.startsWith("/admin/handover-sheet") ||
            path.startsWith("/admin/front-desk") ||
            path.startsWith("/admin/shifts") ||
            path.startsWith("/admin/shift-close") ||
            path.startsWith("/admin/shift-report")
          )
            return "rooms";
          return "dashboard";
        };
        const activeGroup = groupByPath(currentPath);

        document.querySelectorAll(".top-level-link").forEach((link) => {
          if (link.getAttribute("data-top-group") === activeGroup) {
            link.classList.add("top-level-active");
          }
        });

        const sections = Array.from(document.querySelectorAll(".section-tabs"));
        sections.forEach((section) => {
          if (section.getAttribute("data-section") === activeGroup) {
            section.classList.add("active");
            section.querySelectorAll("a").forEach((subLink) => {
              if (normalizePath(subLink.getAttribute("href")) === currentPath) {
                subLink.classList.add("active-link");
              }
            });
          }
        });

        const tables = document.querySelectorAll("table");
        tables.forEach((table) => {
          const headerCells = Array.from(table.querySelectorAll("thead th")).map((th) =>
            th.textContent ? th.textContent.trim() : ""
          );

    <script>
      (function (g) {
        var blockCounts = new Map();
        var openModals = new Set();
        var safetyTimerIds = [];
        var blockOverlayEl = null;

        function totalBlocks() {
          var n = 0;
          blockCounts.forEach(function (c) {
            n += c;
          });
          return n;
        }

        function syncBlockOverlay() {
          if (totalBlocks() > 0) {
            if (!blockOverlayEl) {
              blockOverlayEl = g.document.createElement("div");
              blockOverlayEl.id = "uiStateBlockOverlay";
              blockOverlayEl.setAttribute("aria-hidden", "true");
              blockOverlayEl.style.cssText =
                "display:none;position:fixed;inset:0;z-index:2147483640;background:rgba(15,23,42,0.04);cursor:wait;";
              g.document.body.appendChild(blockOverlayEl);
            }
            blockOverlayEl.style.display = "block";
            blockOverlayEl.setAttribute("aria-hidden", "false");
          } else if (blockOverlayEl) {
            blockOverlayEl.style.display = "none";
            blockOverlayEl.setAttribute("aria-hidden", "true");
          }
        }

        function healStuckDom() {
          g.document.body.classList.remove("modal-open", "rud-drawer-open");
          g.document.body.style.removeProperty("pointer-events");
          g.document.querySelectorAll(".modal-backdrop").forEach(function (el) {
            el.remove();
          });
        }

        function resetAdminOverlayState() {
          healStuckDom();
          var panel = g.document.getElementById("adminNotifPanel");
          if (panel) {
            panel.hidden = true;
            panel.setAttribute("hidden", "");
          }
          var bd = g.document.getElementById("folio-modal-backdrop");
          if (bd) {
            bd.style.display = "none";
            bd.setAttribute("aria-hidden", "true");
          }
          ["folio-charge-modal", "folio-payment-modal"].forEach(function (id) {
            var m = g.document.getElementById(id);
            if (m) {
              m.style.display = "none";
              m.setAttribute("aria-hidden", "true");
            }
          });
        }

        var UIState = {
          block: function (reason) {
            var k = String(reason || "default");
            blockCounts.set(k, (blockCounts.get(k) || 0) + 1);
            syncBlockOverlay();
          },
          unblock: function (reason) {
            var k = String(reason || "default");
            var next = (blockCounts.get(k) || 0) - 1;
            if (next <= 0) blockCounts.delete(k);
            else blockCounts.set(k, next);
            syncBlockOverlay();
          },
          reset: function () {
            blockCounts.clear();
            openModals.clear();
            safetyTimerIds.forEach(function (id) {
              g.clearTimeout(id);
            });
            safetyTimerIds.length = 0;
            if (blockOverlayEl) {
              blockOverlayEl.style.display = "none";
              blockOverlayEl.setAttribute("aria-hidden", "true");
            }
            resetAdminOverlayState();
            g.document.querySelectorAll("form").forEach(function (f) {
              delete f.dataset.uiSubmitting;
              delete f.dataset.uiSafetyTimerId;
            });
            g.document.querySelectorAll("[data-ui-state-disabled]").forEach(function (el) {
              if (el instanceof HTMLButtonElement || el instanceof HTMLInputElement) el.disabled = false;
              el.removeAttribute("data-ui-state-disabled");
            });
          },
          openModal: function (id) {
            var sid = String(id || "modal");
            openModals.add(sid);
            g.document.body.classList.add("modal-open");
          },
          closeModal: function (id) {
            var sid = String(id || "modal");
            openModals.delete(sid);
            if (openModals.size === 0) g.document.body.classList.remove("modal-open");
          },
          withTimeout: function (promise, ms) {
            return new Promise(function (resolve, reject) {
              var settled = false;
              var t = g.setTimeout(function () {
                if (settled) return;
                settled = true;
                reject(new Error("Operation timed out"));
              }, ms);
              Promise.resolve(promise).then(
                function (v) {
                  if (settled) return;
                  settled = true;
                  g.clearTimeout(t);
                  resolve(v);
                },
                function (e) {
                  if (settled) return;
                  settled = true;
                  g.clearTimeout(t);
                  reject(e);
                }
              );
            });
          },
          withBlocking: function (fn, reason, opts) {
            opts = opts || {};
            var r = String(reason || "default");
            UIState.block(r);
            var chain = Promise.resolve().then(function () {
              return fn();
            });
            if (opts.timeoutMs != null && opts.timeoutMs > 0) {
              chain = UIState.withTimeout(chain, opts.timeoutMs);
            }
            return chain.finally(function () {
              UIState.unblock(r);
            });
          },
          beginSubmitGuard: function (form) {
            if (!form) return true;
            if (form.dataset.uiSubmitting === "1") return false;
            form.dataset.uiSubmitting = "1";
            return true;
          },
          endSubmitGuard: function (form) {
            if (form) delete form.dataset.uiSubmitting;
          },
          scheduleSubmitSafety: function (form, releaseFn, ms) {
            if (form && form.dataset.uiSafetyTimerId) {
              var prev = Number(form.dataset.uiSafetyTimerId);
              if (g.isFinite(prev)) {
                g.clearTimeout(prev);
                var pix = safetyTimerIds.indexOf(prev);
                if (pix >= 0) safetyTimerIds.splice(pix, 1);
              }
              delete form.dataset.uiSafetyTimerId;
            }
            var delay = ms == null ? 28000 : ms;
            var tid = g.setTimeout(function () {
              var ix = safetyTimerIds.indexOf(tid);
              if (ix >= 0) safetyTimerIds.splice(ix, 1);
              if (form) delete form.dataset.uiSafetyTimerId;
              try {
                releaseFn();
              } catch (e) {}
            }, delay);
            if (form) form.dataset.uiSafetyTimerId = String(tid);
            safetyTimerIds.push(tid);
            return tid;
          }
        };

        g.UIState = UIState;

        function selfHeal() {
          UIState.reset();
        }

        if (g.document.readyState === "loading") {
          g.document.addEventListener("DOMContentLoaded", selfHeal);
        } else {
          selfHeal();
        }
        g.window.addEventListener("pageshow", selfHeal);

        g.document.querySelectorAll('form[action="/admin/login"], form[action="/auth/staff-login"]').forEach(function (form) {
          form.addEventListener("submit", function (e) {
            if (!UIState.beginSubmitGuard(form)) {
              e.preventDefault();
              return;
            }
            var btn = form.querySelector('button[type="submit"]');
            try {
              resetAdminOverlayState();
              if (btn) {
                btn.disabled = true;
                btn.setAttribute("data-ui-state-disabled", "1");
              }
            } catch (err) {
              UIState.endSubmitGuard(form);
              if (btn) {
                btn.disabled = false;
                btn.removeAttribute("data-ui-state-disabled");
              }
              e.preventDefault();
              throw err;
            } finally {
              UIState.scheduleSubmitSafety(
                form,
                function () {
                  UIState.endSubmitGuard(form);
                  if (btn) {
                    btn.disabled = false;
                    btn.removeAttribute("data-ui-state-disabled");
                  }
                },
                28000
              );
            }
          });
        });
      })(typeof window !== "undefined" ? window : this);
    </script>
