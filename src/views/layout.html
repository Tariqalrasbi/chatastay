<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{adminTitle}}</title>
    <style>
      :root {
        --wa-green: #25d366;
        --wa-green-dark: #128c7e;
        --wa-deep: #075e54;
        --wa-bg: #e5ddd5;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #5f6b7a;
        --border: #d8dee6;
      }
      body {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        margin: 0;
        background: linear-gradient(180deg, #f2f7f5 0%, var(--wa-bg) 100%);
        color: var(--text);
      }
      * {
        box-sizing: border-box;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      .sidebar {
        background: linear-gradient(180deg, var(--wa-deep) 0%, var(--wa-green-dark) 100%);
        color: #fff;
        padding: 22px 16px;
        box-shadow: 6px 0 24px rgba(7, 94, 84, 0.18);
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .brand-logo {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: var(--wa-green);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #093;
        border: 2px solid rgba(255, 255, 255, 0.75);
      }
      .brand h1 {
        font-size: 16px;
        margin: 0;
        line-height: 1.2;
      }
      .brand p {
        margin: 2px 0 0;
        opacity: 0.9;
        font-size: 12px;
      }
      .hotel-card {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 18px;
      }
      .hotel-card strong {
        display: block;
        font-size: 13px;
      }
      .hotel-card span {
        font-size: 12px;
        opacity: 0.92;
      }
      .user-card {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        padding: 9px 12px;
        margin: -8px 0 16px;
      }
      .user-card strong,
      .user-card span {
        display: block;
      }
      .user-card strong {
        font-size: 13px;
      }
      .user-card span {
        font-size: 11px;
        opacity: 0.9;
        margin-top: 2px;
      }
      .lang-switcher {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .lang-switcher a {
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.1);
      }
      .lang-switcher a.active {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
        font-weight: 700;
      }
      nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      nav a,
      nav button {
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        padding: 10px 12px;
        text-align: left;
        font-size: 14px;
        cursor: pointer;
      }
      nav a:hover,
      nav button:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      nav form {
        margin: 0;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
      }
      .sidebar-nav {
        flex: 1;
      }
      .sidebar-logout {
        position: sticky;
        bottom: 0;
        margin-top: 12px;
        padding: 10px 0 2px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        background: linear-gradient(180deg, rgba(18, 140, 126, 0), rgba(7, 94, 84, 0.96) 22%);
        backdrop-filter: blur(10px);
      }
      .sidebar-logout form,
      .sidebar-logout button {
        width: 100%;
      }
      /* Property switcher (top of sidebar). Hidden until JS detects multi-property access. */
      .sidebar-property-switch {
        margin: -8px 0 16px;
      }
      .sidebar-property-switch[hidden] {
        display: none !important;
      }
      .sidebar-property-switch label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.75;
        margin-bottom: 4px;
        color: #fff;
      }
      .sidebar-property-switch select {
        width: 100%;
        max-width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      .sidebar-property-switch select option {
        color: #0f172a;
        background: #fff;
      }
      .top-level-link {
        font-weight: 700;
      }
      nav a.top-level-active {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
      }
      nav a.active-link {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
        font-weight: 700;
      }
      .top-subnav {
        margin: 0 0 12px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #f7faf9;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        align-items: flex-start;
      }
      .top-subnav-main {
        flex: 1;
        min-width: 0;
      }
      .nav-context {
        margin: -4px 0 12px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #ffffff;
        color: var(--muted);
        font-size: 12px;
      }
      .nav-context strong {
        color: var(--text);
        font-weight: 700;
      }
      .nav-context a {
        color: var(--wa-deep);
        font-weight: 700;
        text-decoration: none;
      }
      .nav-context a:hover {
        text-decoration: underline;
      }
      .admin-notif-wrap {
        position: relative;
        flex: 0 0 auto;
      }
      .admin-notif-bell {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 999px;
        width: 38px;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 17px;
      }
      @keyframes admin-notif-bell-pulse-kf {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
        35% {
          box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.35);
        }
        70% {
          box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
        }
      }
      .admin-notif-bell.admin-notif-bell-pulse {
        animation: admin-notif-bell-pulse-kf 1.1s ease-in-out infinite;
        border-color: #ef4444;
      }
      .admin-notif-badge {
        position: absolute;
        top: -5px;
        right: -4px;
        min-width: 18px;
        height: 18px;
        border-radius: 999px;
        padding: 0 5px;
        font-size: 11px;
        line-height: 18px;
        text-align: center;
        background: #ef4444;
        color: #fff;
        font-weight: 700;
      }
      .admin-notif-panel {
        position: absolute;
        top: 44px;
        right: 0;
        width: min(360px, calc(100vw - 40px));
        max-height: min(420px, calc(100dvh - 56px));
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.15);
        z-index: 10020;
      }
      .admin-notif-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      /* Ensure the notification dropdown never intercepts clicks when closed (hidden attr alone can miss edge cases). */
      #adminNotifPanel[hidden],
      .admin-notif-panel[hidden] {
        display: none !important;
        visibility: hidden;
        pointer-events: none !important;
      }
      /* Failsafe: stale overlays must never leave the admin shell unclickable after login/navigation. */
      #uiStateBlockOverlay,
      #folio-modal-backdrop[aria-hidden="true"],
      body:not(.rud-drawer-open) #folio-modal-backdrop,
      body:not(.rud-drawer-open) .rud-drawer,
      .modal-backdrop[aria-hidden="true"] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
      .admin-notif-panel-head {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }
      .admin-notif-actions {
        display: flex;
        gap: 6px;
      }
      .admin-notif-actions button {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        padding: 3px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .admin-notif-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .admin-notif-item a {
        display: block;
        padding: 10px 12px;
        text-decoration: none;
        color: var(--text);
        border-left: 4px solid transparent;
        border-bottom: 1px solid #eef2f7;
      }
      .admin-notif-item:last-child a {
        border-bottom: 0;
      }
      .admin-notif-item.sev-critical a { border-left-color: #dc2626; background: #fef2f2; }
      .admin-notif-item.sev-high a { border-left-color: #f59e0b; background: #fffbeb; }
      .admin-notif-item.sev-normal a { border-left-color: #0b6e6e; }
      .admin-notif-item.sev-info a { border-left-color: #64748b; }
      .admin-notif-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
      .admin-notif-body { font-size: 12px; color: var(--muted); line-height: 1.35; }
      .admin-notif-empty {
        font-size: 12px;
        color: var(--muted);
        padding: 12px;
      }
      .attention-strip {
        margin: 0 0 12px;
        border: 1px solid #fecaca;
        background: #fff5f5;
        border-radius: 12px;
        padding: 10px 12px;
      }
      .attention-strip h4 {
        margin: 0 0 8px;
        font-size: 13px;
      }
      .attention-strip ul {
        margin: 0;
        padding-left: 18px;
      }
      .attention-strip li {
        margin: 4px 0;
        font-size: 13px;
      }
      .section-tabs {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
      }
      .section-tabs.active {
        display: flex;
      }
      .section-tabs a {
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--wa-deep);
        background: #fff;
        font-size: 13px;
        font-weight: 600;
      }
      .section-tabs a.active-link {
        background: var(--wa-green);
        border-color: transparent;
        color: #083d2d;
      }
      .section-tabs .nav-tab-placeholder {
        display: inline-block;
        border: 1px dashed var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--muted);
        background: rgba(248, 250, 249, 0.95);
        font-size: 13px;
        font-weight: 600;
        cursor: default;
        user-select: none;
      }
      .content {
        padding: 24px;
        min-width: 0;
      }
      .admin-toast-stack {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(380px, calc(100vw - 32px));
        pointer-events: none;
      }
      .admin-toast {
        pointer-events: auto;
        background: #fff;
        border: 1px solid var(--border);
        border-left: 4px solid var(--wa-deep);
        border-radius: 10px;
        padding: 10px 12px;
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
        animation: adminToastIn 0.25s ease-out;
      }
      .admin-toast-booking {
        border-left-color: #b45309;
        background: #fffbeb;
      }
      .admin-toast-title {
        display: block;
        font-size: 13px;
        margin: 0 0 4px;
        color: var(--text);
      }
      .admin-toast-body {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
        max-height: 4.2em;
        overflow: hidden;
      }
      .admin-toast-out {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      @keyframes adminToastIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .nav-live-badge {
        display: inline-block;
        min-width: 1.1em;
        padding: 1px 6px;
        margin-left: 4px;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.3;
        border-radius: 999px;
        background: #fbbf24;
        color: #422006;
        vertical-align: middle;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
        padding: 22px;
        overflow-x: auto;
      }
      h2 {
        margin-top: 0;
      }
      h3 {
        margin-top: 0;
      }
      .muted {
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 12px;
      }
      .btn-link {
        display: inline-block;
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f7faf9;
        color: var(--wa-deep);
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
      }
      .btn-link.primary {
        background: var(--wa-green);
        border-color: transparent;
        color: #083d2d;
      }
      .inline-link {
        color: var(--wa-deep);
        text-underline-offset: 2px;
      }
      .stat-link {
        color: inherit;
        text-decoration: none;
      }
      .stat-link:hover {
        text-decoration: underline;
      }
      .timeline {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .bubble {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        max-width: min(760px, 100%);
      }
      .bubble.inbound {
        justify-self: start;
        background: #f8fafc;
      }
      .bubble.outbound {
        justify-self: end;
        background: #dcfce7;
      }
      .bubble-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .bubble-body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.45;
      }
      .bubble-meta {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .stat {
        border: 1px solid var(--border);
        border-left: 6px solid var(--wa-green);
        border-radius: 12px;
        padding: 12px;
      }
      .stat h3 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }
      .stat p {
        margin: 8px 0 0;
        font-size: 22px;
        font-weight: 700;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        min-width: 560px;
      }
      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        font-size: 13px;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge.ok {
        background: #dcfce7;
        color: #166534;
      }
      .badge.pending {
        background: #fef9c3;
        color: #854d0e;
      }
      .badge.alert {
        background: #fee2e2;
        color: #991b1b;
      }
      html[dir="rtl"] body {
        text-align: right;
      }
      html[dir="rtl"] .shell {
        grid-template-columns: 1fr 280px;
      }
      html[dir="rtl"] .sidebar {
        order: 2;
        box-shadow: -6px 0 24px rgba(7, 94, 84, 0.18);
      }
      html[dir="rtl"] .content {
        order: 1;
      }
      html[dir="rtl"] .lang-switcher {
        justify-content: flex-end;
      }
      html[dir="rtl"] nav a,
      html[dir="rtl"] nav button {
        text-align: right;
      }
      html[dir="rtl"] th,
      html[dir="rtl"] td {
        text-align: right;
      }
      html[dir="rtl"] .actions {
        justify-content: flex-end;
      }
      html[dir="rtl"] .section-tabs {
        justify-content: flex-end;
      }
      html[dir="rtl"] .bubble.inbound {
        justify-self: end;
      }
      html[dir="rtl"] .bubble.outbound {
        justify-self: start;
      }
      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .grid-4,
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .sidebar {
          padding: 14px 12px;
          box-shadow: 0 6px 24px rgba(7, 94, 84, 0.18);
        }
        .brand {
          margin-bottom: 12px;
        }
        .hotel-card {
          margin-bottom: 12px;
        }
        nav {
          flex-direction: row;
          overflow-x: auto;
          gap: 8px;
          padding-bottom: 4px;
        }
        nav a,
        nav button {
          white-space: nowrap;
          flex: 0 0 auto;
        }
        .content {
          padding: 14px;
        }
        .panel {
          padding: 14px;
          border-radius: 12px;
        }
      }
      @media (max-width: 640px) {
        .brand-logo {
          width: 40px;
          height: 40px;
        }
        .brand h1 {
          font-size: 15px;
        }
        .brand p {
          font-size: 11px;
        }
        .stat p {
          font-size: 20px;
        }
      }
      @media (max-width: 480px) {
        table {
          min-width: 100%;
          border-collapse: separate;
          border-spacing: 0;
        }
        thead {
          display: none;
        }
        tbody tr {
          display: block;
          margin-bottom: 10px;
          padding: 10px;
          border: 1px solid var(--border);
          border-radius: 12px;
          background: #fff;
        }
        tbody td {
          display: block;
          text-align: right;
          border-bottom: 1px dashed var(--border);
          padding: 8px 0;
          min-height: 22px;
        }
        tbody td:last-child {
          border-bottom: 0;
        }
        tbody td::before {
          content: attr(data-label);
          float: left;
          color: var(--muted);
          font-weight: 600;
          text-align: left;
          padding-right: 10px;
        }
        html[dir="rtl"] tbody td {
          text-align: left;
        }
        html[dir="rtl"] tbody td::before {
          float: right;
          text-align: right;
          padding-right: 0;
          padding-left: 10px;
        }
        tbody th {
          display: block;
          border-bottom: 0;
          padding: 0 0 4px;
          color: var(--muted);
          font-size: 12px;
          font-weight: 600;
        }
      }

      /* Premium WhatsApp-themed SaaS/PMS visual refresh. These overrides keep existing
         routes and form contracts intact while modernizing the operational chrome. */
      :root {
        --wa-green: #25d366;
        --wa-green-dark: #128c7e;
        --wa-deep: #064e46;
        --wa-mint: #d9fbe8;
        --wa-soft: #f4fbf7;
        --wa-ink: #0b1f1c;
        --card: rgba(255, 255, 255, 0.96);
        --text: #10201d;
        --muted: #64736f;
        --border: #dce8e3;
        --shadow-soft: 0 18px 55px rgba(15, 44, 38, 0.09);
        --shadow-card: 0 10px 30px rgba(15, 44, 38, 0.07);
        --radius-lg: 20px;
        --radius-md: 14px;
      }
      body {
        background:
          radial-gradient(circle at 14% -10%, rgba(37, 211, 102, 0.22), transparent 30%),
          radial-gradient(circle at 92% 8%, rgba(18, 140, 126, 0.16), transparent 28%),
          linear-gradient(180deg, #f8fcfa 0%, #eef7f3 42%, #e8f2ee 100%);
        color: var(--text);
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      .shell {
        grid-template-columns: 294px minmax(0, 1fr);
      }
      .sidebar {
        position: sticky;
        top: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(6, 78, 70, 0.98) 0%, rgba(9, 93, 80, 0.98) 52%, rgba(8, 61, 45, 0.98) 100%),
          radial-gradient(circle at top left, rgba(37, 211, 102, 0.28), transparent 34%);
        box-shadow: 12px 0 45px rgba(7, 68, 58, 0.18);
        border-right: 1px solid rgba(255, 255, 255, 0.12);
      }
      .brand-logo {
        background: linear-gradient(135deg, #25d366 0%, #b9f7d3 100%);
        color: #063d31;
        box-shadow: 0 10px 26px rgba(37, 211, 102, 0.22);
      }
      .brand h1 {
        letter-spacing: -0.02em;
      }
      .hotel-card,
      .user-card,

      /* ===== Polish layer 2: spacing, hierarchy, animations, premium SaaS feel ===== */

      /* ===== Polish layer 3: premium SaaS depth, hierarchy, micro-interactions ===== */
      :root {
        --wa-accent: #1bb673;
        --wa-accent-glow: 0 0 0 4px rgba(37, 211, 102, 0.18);
        --shadow-xl: 0 32px 80px -20px rgba(7, 68, 58, 0.22), 0 12px 32px -10px rgba(7, 68, 58, 0.12);
        --shadow-lg: 0 22px 60px -16px rgba(15, 44, 38, 0.18), 0 8px 20px -6px rgba(15, 44, 38, 0.08);
        --shadow-md: 0 14px 36px -12px rgba(15, 44, 38, 0.14), 0 4px 12px -3px rgba(15, 44, 38, 0.06);
        --shadow-sm: 0 4px 12px -3px rgba(15, 44, 38, 0.08);
        --border-soft: rgba(220, 232, 227, 0.7);
        --gradient-primary: linear-gradient(135deg, #25d366 0%, #1bb673 50%, #128c7e 100%);
        --gradient-mesh: radial-gradient(circle at 0% 0%, rgba(37, 211, 102, 0.1), transparent 40%),
                         radial-gradient(circle at 100% 0%, rgba(18, 140, 126, 0.08), transparent 40%);
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body {
        font-family: "Inter", "SF Pro Display", "Segoe UI", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11", "ss01";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        background:
          radial-gradient(ellipse at 8% -8%, rgba(37, 211, 102, 0.18), transparent 35%),
          radial-gradient(ellipse at 95% 5%, rgba(18, 140, 126, 0.14), transparent 32%),
          radial-gradient(ellipse at 50% 100%, rgba(37, 211, 102, 0.06), transparent 40%),
          linear-gradient(180deg, #f7fcf9 0%, #eef7f2 45%, #e6f1ec 100%);
        background-attachment: fixed;
      }

      /* Sidebar premium glass + chrome refinements */
      .sidebar {
        background:
          linear-gradient(180deg, rgba(6, 78, 70, 0.985) 0%, rgba(7, 88, 76, 0.985) 45%, rgba(8, 61, 45, 0.985) 100%),
          radial-gradient(ellipse at 0% 0%, rgba(37, 211, 102, 0.32), transparent 38%),
          radial-gradient(circle at 100% 92%, rgba(18, 140, 126, 0.22), transparent 50%);
        box-shadow: 16px 0 60px -8px rgba(7, 68, 58, 0.28), inset -1px 0 0 rgba(255, 255, 255, 0.06);
      }
      .sidebar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 0%, rgba(37, 211, 102, 0.04) 100%);
        pointer-events: none;
      }
      .brand-logo {
        background: linear-gradient(135deg, #25d366 0%, #b9f7d3 50%, #ffffff 100%);
        box-shadow: 0 12px 32px -6px rgba(37, 211, 102, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        border: 0;
        position: relative;
      }
      .brand-logo::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;

      .brand h1 { font-weight: 800; }

      .hotel-card, .user-card, .sidebar-property-switch select {

        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 4px 12px rgba(0, 0, 0, 0.06);
        transition: background 0.2s var(--ease-out-quart), border-color 0.2s var(--ease-out-quart);

      nav a, nav button {

      .panel {
        position: relative;
        background:

        font-weight: 800;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #0b1f1c 0%, #0e3d34 100%);

        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b7c75;

      .stat p {
        font-size: clamp(24px, 2.4vw, 34px);
        font-weight: 800;
        letter-spacing: -0.035em;
        background: linear-gradient(135deg, #0b1f1c 0%, #0e3d34 70%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;

      /* Buttons: premium gradient with subtle inner highlight, refined states */
      .btn-link, button[type="submit"], .section-tabs a.active-link, .btn-link.primary {
        font-weight: 700;
        letter-spacing: -0.005em;

        background: var(--gradient-primary);

        filter: brightness(1.04);

      input, select, textarea {

        -webkit-backdrop-filter: blur(12px);

        border: 1px solid #b7f1cc;

      .badge.ok { background: linear-gradient(135deg, #dcfce7 0%, #c7f5d6 100%); color: #0b5b32; }
      .badge.pending { background: linear-gradient(135deg, #fef9c3 0%, #fde68a 100%); color: #78510b; }
      .badge.alert { background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%); color: #9f1239; }

        background: linear-gradient(180deg, #ffffff 0%, #f7fdfa 100%);
        border: 1px solid var(--border-soft);
        box-shadow: 0 6px 18px -4px rgba(15, 44, 38, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.85);
      }
      .admin-notif-bell:hover {
        background: linear-gradient(180deg, #ffffff 0%, #ecfaf2 100%);
        transform: translateY(-1px);
      }
      .admin-notif-panel {
        box-shadow: var(--shadow-xl), inset 0 1px 0 rgba(255, 255, 255, 0.85);
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.99) 0%, rgba(252, 255, 253, 0.97) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }

      /* Logout: distinct danger-tinted hover for clarity */
      .sidebar-logout button:hover {
        background: rgba(255, 90, 90, 0.18);
        border-color: rgba(255, 120, 120, 0.34);
      }

      /* Subtle entry stagger for grid items on first paint (not on SPA swap) */
      @keyframes wa-stagger-up {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .grid-4 > .stat,
      .grid-4 > .card,
      .grid-2 > .card {
        animation: wa-stagger-up 0.45s var(--ease-out-quart) both;
      }
      .grid-4 > *:nth-child(1) { animation-delay: 0ms; }
      .grid-4 > *:nth-child(2) { animation-delay: 50ms; }
      .grid-4 > *:nth-child(3) { animation-delay: 100ms; }
      .grid-4 > *:nth-child(4) { animation-delay: 150ms; }
      .grid-4 > *:nth-child(5) { animation-delay: 200ms; }
      .grid-4 > *:nth-child(6) { animation-delay: 250ms; }
      body.admin-navigating .grid-4 > *,
      body.admin-navigating .grid-2 > * { animation: none !important; }

      /* Stagger removal once the bootstrap interaction is done; instant nav stays instant */
      .panel, .stat { animation: none; }

      /* Scrollbar polish */
      body::-webkit-scrollbar-thumb:hover, .panel::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(37, 211, 102, 0.7), rgba(7, 94, 84, 0.6));
      }

      /* Selection */
      ::selection { background: rgba(37, 211, 102, 0.3); color: #053b18; }

      /* ===== Polish layer 4: WhatsApp pulse signals + premium hover reveal ===== */
      /* Pulsing dot on active sidebar tab (green WhatsApp heartbeat) */
      @keyframes wa-active-dot-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.85), 0 0 0 0 rgba(37, 211, 102, 0.7); }
        50%  { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.45), 0 0 0 8px rgba(37, 211, 102, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0), 0 0 0 0 rgba(37, 211, 102, 0); }
      }
      nav a.top-level-active::after,
      nav a.active-link::after {
        content: "";
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
        animation: wa-active-dot-pulse 1.6s ease-out infinite;
      }
      html[dir="rtl"] nav a.top-level-active::after,
      html[dir="rtl"] nav a.active-link::after { right: auto; left: 12px; }

      /* Leading green vertical bar on the active sidebar link (slides in) */
      .sidebar nav a, .sidebar nav button { overflow: hidden; }
      .sidebar nav a::before, .sidebar nav button::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(180deg, #25d366 0%, #1bb673 100%);
        transform: scaleY(0);
        transform-origin: center;
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 0 12px rgba(37, 211, 102, 0.5);
      }
      .sidebar nav a:hover::before, .sidebar nav button:hover::before { transform: scaleY(0.6); }
      .sidebar nav a.top-level-active::before,
      .sidebar nav a.active-link::before { transform: scaleY(1); }
      html[dir="rtl"] .sidebar nav a::before, html[dir="rtl"] .sidebar nav button::before {
        left: auto; right: 0; border-radius: 4px 0 0 4px;
      }

      /* Section-tabs: animated underline grow on hover, brighter on active */
      .section-tabs a { position: relative; overflow: hidden; }
      .section-tabs a::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 4px;
        height: 2px;
        border-radius: 2px;
        background: linear-gradient(90deg, #25d366, #1bb673);
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .section-tabs a:hover::after { transform: scaleX(1); }
      .section-tabs a.active-link::after { display: none; }

      /* Hover reveal: chevron arrow slides into view on sidebar items */
      .sidebar nav a, .sidebar nav button {
        padding-right: 32px !important;
      }
      .sidebar nav a > .nav-hover-arrow,
      .sidebar nav button > .nav-hover-arrow { display: none; }
      .sidebar nav a:not(.top-level-active):not(.active-link)::after,
      .sidebar nav button:not(.top-level-active):not(.active-link)::after {
        content: "›";
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%) translateX(-4px);
        opacity: 0;
        font-size: 18px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.85);
        transition: opacity 0.18s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
      }
      .sidebar nav a:hover:not(.top-level-active):not(.active-link)::after,
      .sidebar nav button:hover:not(.top-level-active):not(.active-link)::after {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
      html[dir="rtl"] .sidebar nav a:not(.top-level-active):not(.active-link)::after,
      html[dir="rtl"] .sidebar nav button:not(.top-level-active):not(.active-link)::after {
        right: auto; left: 12px; content: "‹";
        transform: translateY(-50%) translateX(4px);
      }
      html[dir="rtl"] .sidebar nav a:hover:not(.top-level-active):not(.active-link)::after,
      html[dir="rtl"] .sidebar nav button:hover:not(.top-level-active):not(.active-link)::after {
        transform: translateY(-50%) translateX(0);
      }

      /* Bell pulse: stronger green-themed ring (still red when alarm-class set) */
      @keyframes wa-bell-glow {
        0%   { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.55), 0 6px 18px -4px rgba(15, 44, 38, 0.1); }
        60%  { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0), 0 6px 18px -4px rgba(15, 44, 38, 0.1); }
        100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0), 0 6px 18px -4px rgba(15, 44, 38, 0.1); }
      }
      .admin-notif-bell.admin-notif-bell-pulse {
        border-color: #25d366;
        animation: wa-bell-glow 1.6s ease-out infinite, admin-notif-bell-pulse-kf 1.6s ease-in-out infinite;
      }
      /* Subtle "you have something" hint on the bell badge counter */
      .admin-notif-badge:not([hidden]) {
        background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        color: #fff;
        font-weight: 800;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18), 0 4px 10px rgba(239, 68, 68, 0.32);
      }

      /* Hover lift on stat cards now also tints the gradient strip slightly more */
      .stat:hover::before { filter: brightness(1.18); }

      /* Sidebar nav text hint: tiny shift + brightness on hover for affordance */
      .sidebar nav a, .sidebar nav button {
        transition: transform 0.18s cubic-bezier(0.25, 1, 0.5, 1),
                    background 0.18s cubic-bezier(0.25, 1, 0.5, 1),
                    border-color 0.18s cubic-bezier(0.25, 1, 0.5, 1),
                    box-shadow 0.18s cubic-bezier(0.25, 1, 0.5, 1),
                    color 0.18s cubic-bezier(0.25, 1, 0.5, 1),
                    padding-left 0.18s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .sidebar nav a:hover, .sidebar nav button:hover { padding-left: 18px !important; }
      html[dir="rtl"] .sidebar nav a:hover, html[dir="rtl"] .sidebar nav button:hover {
        padding-left: 14px !important; padding-right: 32px !important;
      }

      /* Top-level-active green active state already exists; ensure dot contrasts well */
      nav a.top-level-active::after, nav a.active-link::after {
        background: #053b18;
      }

      /* Reduced motion still wins */
      @media (prefers-reduced-motion: reduce) {
        .grid-4 > .stat, .grid-4 > .card, .grid-2 > .card { animation: none !important; }
        nav a.top-level-active::after, nav a.active-link::after { animation: none !important; }
        .admin-notif-bell.admin-notif-bell-pulse { animation: none !important; }
        * { transition-duration: 0.001ms !important; animation-duration: 0.001ms !important; }
      }
    </style>
  </head>
  <body{{uiErrorContextAttrs}}>
    <script src="/static/ui-error-tracker.js"></script>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-logo">CS</div>
          <div>
            <h1>{{adminTitle}}</h1>
            <p>{{brandTagline}}</p>
          </div>
        </div>
        <div class="lang-switcher">{{langSwitcher}}</div>
        <div class="hotel-card">
          <strong>{{hotelName}}</strong>
          <span>{{hotelSign}}</span>
        </div>
        {{propertySwitcher}}
        {{userIdentity}}
        <nav class="sidebar-nav">{{navLinks}}</nav>
        <div class="sidebar-logout">{{logoutAction}}</div>
      </aside>
      <main class="content">
        <div class="top-subnav">
          <div class="top-subnav-main">{{sectionTabs}}</div>
          <div class="admin-notif-wrap">
            <button id="adminNotifBell" class="admin-notif-bell" type="button" title="Notifications">🔔</button>
            <span id="adminNotifBadge" class="admin-notif-badge" hidden>0</span>
            <div id="adminNotifPanel" class="admin-notif-panel" hidden>
              <div class="admin-notif-panel-head">
                <strong style="font-size:13px">Notifications</strong>
                <div class="admin-notif-actions">
                  <button id="adminNotifMute" type="button" title="Mute alert sound">🔔</button>
                  <button id="adminNotifReadAll" type="button">Read all</button>
                </div>
              </div>
              <div class="admin-notif-scroll">
                <ul id="adminNotifList" class="admin-notif-list"></ul>
                <p id="adminNotifEmpty" class="admin-notif-empty">No new notifications.</p>
              </div>
            </div>
          </div>
        </div>
        <section id="adminAttentionStrip" class="attention-strip" hidden>
          <h4>Attention Needed</h4>
          <ul id="adminAttentionList"></ul>
        </section>
        <div id="adminNavContext" class="nav-context" hidden></div>
        <section id="adminPanelContent" class="panel">{{content}}</section>
      </main>
    </div>
    <script>
      (function () {
        var cookieName = "chatastay_lang";
        var query = new URLSearchParams(window.location.search);
        var queryLang = query.get("lang");
        if (queryLang === "en" || queryLang === "ar") {
          document.cookie = cookieName + "=" + queryLang + "; Path=/; Max-Age=31536000; SameSite=Lax";
          query.delete("lang");
          var queryString = query.toString();
          var next = window.location.pathname + (queryString ? "?" + queryString : "") + window.location.hash;
          window.location.replace(next);
          return;
        }

        var cookieMatch = document.cookie.match(new RegExp("(?:^|; )" + cookieName + "=([^;]+)"));
        var lang = cookieMatch && cookieMatch[1] === "ar" ? "ar" : "en";
        document.documentElement.setAttribute("lang", lang);
        document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

        document.querySelectorAll("[data-lang-link]").forEach(function (link) {
          if (link.getAttribute("data-lang-link") === lang) {
            link.classList.add("active");
          }
        });

        var normalizePath = function (href) {
          if (!href) return "";
          try {
            var u = new URL(href, window.location.origin);
            return u.pathname.replace(/\/+$/, "") || "/";
          } catch (e) {
            return "";
          }
        };
        var currentPath = (window.location.pathname || "/").replace(/\/+$/, "") || "/";
        var groupByPath = function (path) {
          if (path.startsWith("/admin/workspaces")) return "dashboard";
          if (path.startsWith("/admin/module/")) return "dashboard";
          if (path === "/admin/profile") return "account";
          if (path.startsWith("/admin/leads") || path.startsWith("/admin/onboard")) return "dashboard";
          if (
            path.startsWith("/admin/users") ||
            path.startsWith("/admin/audit-trail") ||
            path.startsWith("/admin/subscription") ||
            path.startsWith("/admin/billing") ||
            path.startsWith("/admin/integrations") ||
            path.startsWith("/admin/handover-sheet") ||
            path.startsWith("/admin/shifts") ||
            path.startsWith("/admin/shift-close") ||
            path.startsWith("/admin/shift-report") ||
            path.startsWith("/admin/setup")
          )
            return "account";
          if (
            path.startsWith("/admin/reports") ||
            path.startsWith("/admin/management-kpi") ||
            path.startsWith("/admin/daily-digest") ||
            path.startsWith("/admin/ai-analytics") ||
            path.startsWith("/admin/analytics") ||
            path.startsWith("/admin/booking-funnel") ||
            path.startsWith("/admin/routing-health")
          )
            return "insights";
          if (
            path.startsWith("/admin/fb") ||
            path.startsWith("/admin/restaurant-ops") ||
            path.startsWith("/admin/outlet-dashboard") ||
            path.startsWith("/admin/outlet-orders")
          )
            return "fb";
          if (path.startsWith("/admin/conversations") || path.startsWith("/admin/campaigns")) return "comms";
          if (
            path.startsWith("/admin/bookings") ||
            path.startsWith("/admin/calendar") ||
            path.startsWith("/admin/guests")
          )
            return "reservations";
          if (
            path.startsWith("/admin/rooms") ||
            path.startsWith("/admin/inventory") ||
            path.startsWith("/admin/offers")
          )
            return "inventory";
          if (path.startsWith("/admin/room-board") || path.startsWith("/admin/front-desk")) return "frontdesk";
          if (path.startsWith("/admin/housekeeping") || path.startsWith("/admin/hk")) return "housekeeping";
          return "dashboard";
        };
        var activeGroup = groupByPath(currentPath);
        var groupLabels = {
          dashboard: "Today",
          reservations: "Reservations",
          frontdesk: "Front Desk",
          inventory: "Rooms & Rates",
          housekeeping: "Housekeeping",
          comms: "WhatsApp Center",
          fb: "Restaurant / Café",
          insights: "Reports",
          account: "Settings",
          modules: "Workspaces",
        };
        var escapeText = function (value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        };

        document.querySelectorAll(".top-level-link").forEach(function (link) {
          if (link.getAttribute("data-top-group") === activeGroup) {
            link.classList.add("top-level-active");
          }
        });

        var sections = Array.from(document.querySelectorAll(".section-tabs"));
        var activeSectionLink = null;
        sections.forEach(function (section) {
          if (section.getAttribute("data-section") === activeGroup) {
            section.classList.add("active");
            var subLinks = Array.from(section.querySelectorAll("a"));
            activeSectionLink =
              subLinks.find(function (subLink) {
                return normalizePath(subLink.getAttribute("href")) === currentPath;
              }) || null;
            if (!activeSectionLink) {
              var parentMatches = subLinks
                .filter(function (subLink) {
                  var hrefPath = normalizePath(subLink.getAttribute("href"));
                  return hrefPath !== "/" && currentPath.startsWith(hrefPath + "/");
                })
                .sort(function (a, b) {
                  return normalizePath(b.getAttribute("href")).length - normalizePath(a.getAttribute("href")).length;
                });
              activeSectionLink = parentMatches.length > 0 ? parentMatches[0] : null;
            }
            if (activeSectionLink) {
              activeSectionLink.classList.add("active-link");
            }
          }
        });

        var updateNavContext = function (groupKey, sectionLink) {
          var navContext = document.getElementById("adminNavContext");
          if (!navContext) return;
          var h = document.querySelector(".panel h1, .panel h2");
          var pageTitle = h && h.textContent ? h.textContent.trim() : "";
          var groupLabel = groupLabels[groupKey] || "Today";
          var subLabel =
            sectionLink && sectionLink.textContent
              ? sectionLink.textContent.replace(/\s+/g, " ").trim()
              : "";
          var parts = ["<strong>" + escapeText(groupLabel) + "</strong>"];
          if (subLabel && subLabel !== groupLabel) parts.push(escapeText(subLabel));
          if (pageTitle && pageTitle !== subLabel && pageTitle !== groupLabel) parts.push(escapeText(pageTitle));
          navContext.innerHTML = parts.join(" &rsaquo; ");
          navContext.hidden = parts.length <= 1 && groupKey === "dashboard";
        };
        updateNavContext(activeGroup, activeSectionLink);

        var decorateTables = function (root) {
          var scope = root || document;
          var tables = scope.querySelectorAll("table");
          tables.forEach(function (table) {
            var headerCells = Array.from(table.querySelectorAll("thead th")).map(function (th) {
              return th.textContent ? th.textContent.trim() : "";
            });
            table.querySelectorAll("tbody tr").forEach(function (row) {
              var rowHeader = row.querySelector("th");
              var rowHeaderText = rowHeader && rowHeader.textContent ? rowHeader.textContent.trim() : "";
              var dataCells = Array.from(row.querySelectorAll("td"));
              dataCells.forEach(function (cell, index) {
                if (cell.hasAttribute("data-label") || Number(cell.getAttribute("colspan") || "1") > 1) {
                  return;
                }
                var fallback = rowHeaderText || "Field " + (index + 1);
                var label = headerCells[index] || fallback;
                cell.setAttribute("data-label", label);
              });
            });
          });
        };
        decorateTables(document);

        // Admin instant navigation: keep the PMS shell mounted, fetch the next
        // server-rendered page, then swap the content area. Routes and forms stay
        // unchanged; failures fall back to normal browser navigation.
        var pageCache = new Map();
        var inFlightPages = new Map();
        var shouldInstantNavigate = function (link) {
          if (!link || link.target || link.hasAttribute("download")) return false;
          var href = link.getAttribute("href") || "";
          if (!href || href[0] === "#" || href.startsWith("javascript:") || href.startsWith("mailto:") || href.startsWith("tel:")) return false;
          try {
            var u = new URL(href, window.location.origin);
            if (u.origin !== window.location.origin) return false;
            if (u.pathname === window.location.pathname && u.search === window.location.search) return false;
            return u.pathname.startsWith("/admin/");
          } catch (e) {
            return false;
          }
        };
        var loadPage = function (url) {
          var href = new URL(url, window.location.origin).toString();
          if (pageCache.has(href)) {
            return Promise.resolve(pageCache.get(href));
          }
          if (inFlightPages.has(href)) {
            return inFlightPages.get(href);
          }
          var req = window
            .fetch(href, {
              method: "GET",
              credentials: "same-origin",
              headers: { Accept: "text/html" },
              priority: "low"
            })
            .then(function (res) {
              if (!res.ok) throw new Error("Navigation fetch failed: " + res.status);
              return res.text().then(function (html) {
                return { html: html, status: res.status };
              });
            })
            .then(function (payload) {
              var doc = new DOMParser().parseFromString(payload.html, "text/html");
              if (!doc.querySelector("#adminPanelContent")) throw new Error("Missing admin content shell");
              pageCache.set(href, doc);
              return doc;
            })
            .finally(function () {
              inFlightPages.delete(href);
            });
          inFlightPages.set(href, req);
          return req;
        };
        var prefetchLink = function (link) {
          if (!shouldInstantNavigate(link)) return;
          loadPage(new URL(link.getAttribute("href") || "", window.location.origin)).catch(function () {});
        };
        var runInsertedScripts = function (root) {
          Array.from(root.querySelectorAll("script")).forEach(function (oldScript) {
            var next = document.createElement("script");
            Array.from(oldScript.attributes).forEach(function (attr) {
              next.setAttribute(attr.name, attr.value);
            });
            next.text = oldScript.text || oldScript.textContent || "";
            oldScript.parentNode.replaceChild(next, oldScript);
          });
        };
        var applyActiveNavForPath = function (path) {
          var cleanPath = (path || window.location.pathname || "/").replace(/\/+$/, "") || "/";
          var active = groupByPath(cleanPath);
          document.querySelectorAll(".top-level-link").forEach(function (link) {
            link.classList.toggle("top-level-active", link.getAttribute("data-top-group") === active);
            link.classList.remove("is-nav-clicked");
          });
          var newActiveSectionLink = null;
          document.querySelectorAll(".section-tabs").forEach(function (section) {
            section.classList.toggle("active", section.getAttribute("data-section") === active);
            Array.from(section.querySelectorAll("a")).forEach(function (subLink) {
              var hrefPath = normalizePath(subLink.getAttribute("href"));
              var exact = hrefPath === cleanPath;
              var parent = hrefPath !== "/" && cleanPath.startsWith(hrefPath + "/");
              var isActive = exact || parent;
              subLink.classList.toggle("active-link", isActive);
              subLink.classList.remove("is-nav-clicked");
              if (isActive && !newActiveSectionLink) newActiveSectionLink = subLink;
            });
          });
          updateNavContext(active, newActiveSectionLink);
          decorateTables(document.getElementById("adminPanelContent") || document);
        };
        var bindInstantLinks = function (root) {
          root.querySelectorAll(".sidebar-nav a, .section-tabs a").forEach(function (link) {
            if (link.dataset.instantNavBound === "1") return;
            link.dataset.instantNavBound = "1";
            link.addEventListener("pointerenter", function () {
              prefetchLink(link);
            });
            link.addEventListener("focus", function () {
              prefetchLink(link);
            });
            link.addEventListener("pointerdown", function () {
              if (!shouldInstantNavigate(link)) return;
              link.classList.add("is-nav-clicked");
              document.body.classList.add("admin-navigating");
            prefetchLink(link);
            });
            link.addEventListener("click", function (event) {
              if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button !== 0) return;
              if (!shouldInstantNavigate(link)) return;
              event.preventDefault();
              var url = new URL(link.getAttribute("href") || "", window.location.origin);
              navigateInstant(url.toString(), true).catch(function () {
                window.location.assign(url.toString());
              });
            });
          });
        };
        var navigateInstant = function (href, push) {
          document.body.classList.add("admin-navigating");
          return loadPage(href).then(function (doc) {
            var incomingPanel = doc.querySelector("#adminPanelContent");
            var currentPanel = document.querySelector("#adminPanelContent");
            if (!incomingPanel || !currentPanel) throw new Error("Missing admin content shell");
            currentPanel.innerHTML = incomingPanel.innerHTML;
            if (doc.title) document.title = doc.title;
            var url = new URL(href, window.location.origin);
            if (push) window.history.pushState({ instantAdmin: true, href: url.toString() }, doc.title || "", url.pathname + url.search + url.hash);
            applyActiveNavForPath(url.pathname);
            runInsertedScripts(currentPanel);
            bindInstantLinks(currentPanel);
            document.body.classList.remove("admin-navigating");
            window.scrollTo({ top: 0, left: 0, behavior: "auto" });
          }).catch(function (err) {
            document.body.classList.remove("admin-navigating");
            throw err;
          });
        };
        bindInstantLinks(document);

    <script>
      (function (g) {
        var blockCounts = new Map();
        var silentCounts = new Map();
        var openModals = new Set();
        var safetyTimerIds = [];
        var blockOverlayEl = null;
        var singleFlightChains = new Map();

        function overlayBlockTotal() {
          var n = 0;
          blockCounts.forEach(function (c) {
            n += c;
          });
          return n;
        }

        function ensureBlockOverlay() {
          if (!blockOverlayEl) {
            blockOverlayEl = g.document.createElement("div");
            blockOverlayEl.id = "uiStateBlockOverlay";
            blockOverlayEl.setAttribute("aria-hidden", "true");
            blockOverlayEl.style.cssText =
              "display:none;position:fixed;inset:0;z-index:2147483640;background:rgba(15,23,42,0.05);cursor:wait;pointer-events:auto;";
            g.document.body.appendChild(blockOverlayEl);
          }
          return blockOverlayEl;
        }

        function syncBlockOverlay() {
          if (overlayBlockTotal() > 0) {
            var el = ensureBlockOverlay();
            el.style.display = "block";
            el.style.pointerEvents = "auto";
            el.setAttribute("aria-hidden", "false");
          } else if (blockOverlayEl) {
            blockOverlayEl.style.display = "none";
            blockOverlayEl.style.pointerEvents = "none";
            blockOverlayEl.setAttribute("aria-hidden", "true");
          }
        }

        function healStuckDom() {
          g.document.body.classList.remove("modal-open", "rud-drawer-open");
          g.document.body.style.removeProperty("pointer-events");
          var overlay = g.document.getElementById("uiStateBlockOverlay");
          if (overlay) {
            overlay.style.display = "none";
            overlay.style.pointerEvents = "none";
            overlay.setAttribute("aria-hidden", "true");
          }
          g.document.querySelectorAll(".modal-backdrop").forEach(function (el) {
            el.remove();
          });
        }

        function applyShellHeal() {
          healStuckDom();
          var panel = g.document.getElementById("adminNotifPanel");
          if (panel) {
            panel.hidden = true;
            panel.setAttribute("hidden", "");
          }
          var bd = g.document.getElementById("folio-modal-backdrop");
          if (bd) {
            bd.style.display = "none";
            bd.setAttribute("aria-hidden", "true");
          }
          ["folio-charge-modal", "folio-payment-modal"].forEach(function (id) {
            var m = g.document.getElementById(id);
            if (m) {
              m.style.display = "none";
              m.setAttribute("aria-hidden", "true");
            }
          });
        }

        var UIState = {
          healDomArtifacts: function () {
            applyShellHeal();
          },
          block: function (reason, opts) {
            opts = opts || {};
            var k = String(reason || "default");
            if (opts.noOverlay) {
              silentCounts.set(k, (silentCounts.get(k) || 0) + 1);
            } else {
              blockCounts.set(k, (blockCounts.get(k) || 0) + 1);
            }
            syncBlockOverlay();
          },
          unblock: function (reason, opts) {
            opts = opts || {};
            var k = String(reason || "default");
            if (opts.force) {
              blockCounts.delete(k);
              silentCounts.delete(k);
            } else if (opts.noOverlay) {
              var sn = (silentCounts.get(k) || 0) - 1;
              if (sn <= 0) silentCounts.delete(k);
              else silentCounts.set(k, sn);
            } else {
              var next = (blockCounts.get(k) || 0) - 1;
              if (next <= 0) blockCounts.delete(k);
              else blockCounts.set(k, next);
            }
            syncBlockOverlay();
          },
          reset: function (reason) {
            if (reason != null && String(reason) !== "") {
              var rk = String(reason);
              blockCounts.delete(rk);
              silentCounts.delete(rk);
              syncBlockOverlay();
              return;
            }
            blockCounts.clear();
            silentCounts.clear();
            openModals.clear();
            singleFlightChains.clear();
            safetyTimerIds.forEach(function (id) {
              g.clearTimeout(id);
            });
            safetyTimerIds.length = 0;
            if (blockOverlayEl) {
              blockOverlayEl.style.display = "none";
              blockOverlayEl.setAttribute("aria-hidden", "true");
            }
            applyShellHeal();
            g.document.querySelectorAll("form").forEach(function (f) {
              delete f.dataset.uiSubmitting;
              delete f.dataset.uiSafetyTimerId;
            });
            g.document.querySelectorAll("[data-ui-state-disabled]").forEach(function (el) {
              if (el instanceof HTMLButtonElement || el instanceof HTMLInputElement) el.disabled = false;
              el.removeAttribute("data-ui-state-disabled");
            });
          },
          openModal: function (id) {
            var sid = String(id || "modal");
            openModals.add(sid);
            g.document.body.classList.add("modal-open");
          },
          closeModal: function (id) {
            if (id == null || String(id) === "") {
              openModals.clear();
              g.document.body.classList.remove("modal-open");
              return;
            }
            openModals.delete(String(id));
            if (openModals.size === 0) g.document.body.classList.remove("modal-open");
          },
          withTimeout: function (promise, ms, label) {
            var ms2 = ms == null || !g.isFinite(ms) || ms <= 0 ? 60000 : ms;
            var msg = label ? "Operation timed out: " + label : "Operation timed out";
            return new Promise(function (resolve, reject) {
              var settled = false;
              var t = g.setTimeout(function () {
                if (settled) return;
                settled = true;
                reject(new Error(msg));
              }, ms2);
              Promise.resolve(promise).then(
                function (v) {
                  if (settled) return;
                  settled = true;
                  g.clearTimeout(t);
                  resolve(v);
                },
                function (e) {
                  if (settled) return;
                  settled = true;
                  g.clearTimeout(t);
                  reject(e);
                }
              );
            });
          },
          withBlocking: function (fn, reason, opts) {
            opts = opts || {};
            var r = String(reason || "default");
            var bo = opts.blockOpts || {};
            UIState.block(r, bo);
            var chain = Promise.resolve().then(function () {
              return fn();
            });
            var tms = opts.timeoutMs;
            if (tms != null && tms > 0) {
              chain = UIState.withTimeout(chain, tms, opts.timeoutLabel);
            }
            return chain.finally(function () {
              UIState.unblock(r, opts.unblockOpts != null ? opts.unblockOpts : bo);
            });
          },
          safeNavigate: function (url) {
            try {
              UIState.reset();
              g.location.assign(String(url));
            } catch (e) {
              UIState.reset();
              throw e;
            }
          },
          makeSingleFlight: function (fn, key) {
            var k = String(key == null ? "default" : key);
            return function () {
              var self = this;
              var args = Array.prototype.slice.call(arguments);
              if (singleFlightChains.has(k)) return singleFlightChains.get(k);
              var p = Promise.resolve()
                .then(function () {
                  return fn.apply(self, args);
                })
                .finally(function () {
                  singleFlightChains.delete(k);
                });
              singleFlightChains.set(k, p);
              return p;
            };
          },
          beginSubmitGuard: function (form) {
            if (!form) return true;
            if (form.dataset.uiSubmitting === "1") return false;
            form.dataset.uiSubmitting = "1";
            return true;
          },
          endSubmitGuard: function (form) {
            if (form) delete form.dataset.uiSubmitting;
          },
          scheduleSubmitSafety: function (form, releaseFn, ms) {
            if (form && form.dataset.uiSafetyTimerId) {
              var prev = Number(form.dataset.uiSafetyTimerId);
              if (g.isFinite(prev)) {
                g.clearTimeout(prev);
                var pix = safetyTimerIds.indexOf(prev);
                if (pix >= 0) safetyTimerIds.splice(pix, 1);
              }
              delete form.dataset.uiSafetyTimerId;
            }
            var delay = ms == null ? 28000 : ms;
            var tid = g.setTimeout(function () {
              var ix = safetyTimerIds.indexOf(tid);
              if (ix >= 0) safetyTimerIds.splice(ix, 1);
              if (form) delete form.dataset.uiSafetyTimerId;
              try {
                releaseFn();
              } catch (e) {}
            }, delay);
            if (form) form.dataset.uiSafetyTimerId = String(tid);
            safetyTimerIds.push(tid);
            return tid;
          }
        };

        g.UIState = UIState;

        function selfHeal() {
          UIState.reset();
        }

        function bindLoginFormsSafely() {
          g.document.querySelectorAll('form[action="/admin/login"], form[action="/auth/staff-login"]').forEach(function (form) {
            if (form.dataset.uiLoginBound === "1") return;
            form.dataset.uiLoginBound = "1";
            form.addEventListener("submit", function (e) {
              if (!UIState.beginSubmitGuard(form)) {
                e.preventDefault();
                return;
              }
              var btn = form.querySelector('button[type="submit"]');
              var loginReason = "login:" + (form.getAttribute("action") || "form");
              try {
                UIState.block(loginReason, { noOverlay: true });
                UIState.healDomArtifacts();
                if (btn) {
                  btn.disabled = true;
                  btn.setAttribute("data-ui-state-disabled", "1");
                }
              } catch (err) {
                UIState.unblock(loginReason, { noOverlay: true, force: true });
                UIState.endSubmitGuard(form);
                if (btn) {
                  btn.disabled = false;
                  btn.removeAttribute("data-ui-state-disabled");
                }
                e.preventDefault();
                throw err;
              } finally {
                UIState.scheduleSubmitSafety(
                  form,
                  function () {
                    UIState.unblock(loginReason, { noOverlay: true, force: true });
                    UIState.endSubmitGuard(form);
                    if (btn) {
                      btn.disabled = false;
                      btn.removeAttribute("data-ui-state-disabled");
                    }
                  },
                  28000
                );
              }
            });
          });
        }

        function boot() {
          selfHeal();
          bindLoginFormsSafely();
        }

        if (g.document.readyState === "loading") {
          g.document.addEventListener("DOMContentLoaded", boot);
        } else {
          boot();
        }
        g.window.addEventListener("pageshow", selfHeal);
      })(typeof window !== "undefined" ? window : this);
    </script>
