<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{adminTitle}}</title>
    <style>
      :root {
        --wa-green: #25d366;
        --wa-green-dark: #128c7e;
        --wa-deep: #075e54;
        --wa-bg: #e5ddd5;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #5f6b7a;
        --border: #d8dee6;
      }
      body {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        margin: 0;
        background: linear-gradient(180deg, #f2f7f5 0%, var(--wa-bg) 100%);
        color: var(--text);
      }
      * {
        box-sizing: border-box;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      .sidebar {
        background: linear-gradient(180deg, var(--wa-deep) 0%, var(--wa-green-dark) 100%);
        color: #fff;
        padding: 22px 16px;
        box-shadow: 6px 0 24px rgba(7, 94, 84, 0.18);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .brand-logo {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: var(--wa-green);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #093;
        border: 2px solid rgba(255, 255, 255, 0.75);
      }
      .brand h1 {
        font-size: 16px;
        margin: 0;
        line-height: 1.2;
      }
      .brand p {
        margin: 2px 0 0;
        opacity: 0.9;
        font-size: 12px;
      }
      .hotel-card {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 18px;
      }
      .hotel-card strong {
        display: block;
        font-size: 13px;
      }
      .hotel-card span {
        font-size: 12px;
        opacity: 0.92;
      }
      .lang-switcher {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .lang-switcher a {
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.1);
      }
      .lang-switcher a.active {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
        font-weight: 700;
      }
      nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      nav a,
      nav button {
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        padding: 10px 12px;
        text-align: left;
        font-size: 14px;
        cursor: pointer;
      }
      nav a:hover,
      nav button:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      nav form {
        margin: 0;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
      }
      .sidebar-nav {
        flex: 1;
      }
      .sidebar-logout {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }
      .top-level-link {
        font-weight: 700;
      }
      nav a.top-level-active {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
      }
      nav a.active-link {
        background: #25d366;
        color: #083d2d;
        border-color: transparent;
        font-weight: 700;
      }
      .top-subnav {
        margin: 0 0 12px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #f7faf9;
      }
      .section-tabs {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
      }
      .section-tabs.active {
        display: flex;
      }
      .section-tabs a {
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--wa-deep);
        background: #fff;
        font-size: 13px;
        font-weight: 600;
      }
      .section-tabs a.active-link {
        background: var(--wa-green);
        border-color: transparent;
        color: #083d2d;
      }
      .section-tabs .nav-tab-placeholder {
        display: inline-block;
        border: 1px dashed var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--muted);
        background: rgba(248, 250, 249, 0.95);
        font-size: 13px;
        font-weight: 600;
        cursor: default;
        user-select: none;
      }
      .content {
        padding: 24px;
        min-width: 0;
      }
      .admin-toast-stack {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(380px, calc(100vw - 32px));
        pointer-events: none;
      }
      .admin-toast {
        pointer-events: auto;
        background: #fff;
        border: 1px solid var(--border);
        border-left: 4px solid var(--wa-deep);
        border-radius: 10px;
        padding: 10px 12px;
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
        animation: adminToastIn 0.25s ease-out;
      }
      .admin-toast-booking {
        border-left-color: #b45309;
        background: #fffbeb;
      }
      .admin-toast-title {
        display: block;
        font-size: 13px;
        margin: 0 0 4px;
        color: var(--text);
      }
      .admin-toast-body {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
        max-height: 4.2em;
        overflow: hidden;
      }
      .admin-toast-out {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      @keyframes adminToastIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .nav-live-badge {
        display: inline-block;
        min-width: 1.1em;
        padding: 1px 6px;
        margin-left: 4px;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.3;
        border-radius: 999px;
        background: #fbbf24;
        color: #422006;
        vertical-align: middle;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
        padding: 22px;
        overflow-x: auto;
      }
      h2 {
        margin-top: 0;
      }
      h3 {
        margin-top: 0;
      }
      .muted {
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 12px;
      }
      .btn-link {
        display: inline-block;
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f7faf9;
        color: var(--wa-deep);
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
      }
      .btn-link.primary {
        background: var(--wa-green);
        border-color: transparent;
        color: #083d2d;
      }
      .inline-link {
        color: var(--wa-deep);
        text-underline-offset: 2px;
      }
      .stat-link {
        color: inherit;
        text-decoration: none;
      }
      .stat-link:hover {
        text-decoration: underline;
      }
      .timeline {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .bubble {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        max-width: min(760px, 100%);
      }
      .bubble.inbound {
        justify-self: start;
        background: #f8fafc;
      }
      .bubble.outbound {
        justify-self: end;
        background: #dcfce7;
      }
      .bubble-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .bubble-body {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.45;
      }
      .bubble-meta {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .stat {
        border: 1px solid var(--border);
        border-left: 6px solid var(--wa-green);
        border-radius: 12px;
        padding: 12px;
      }
      .stat h3 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }
      .stat p {
        margin: 8px 0 0;
        font-size: 22px;
        font-weight: 700;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        min-width: 560px;
      }
      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        font-size: 13px;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge.ok {
        background: #dcfce7;
        color: #166534;
      }
      .badge.pending {
        background: #fef9c3;
        color: #854d0e;
      }
      .badge.alert {
        background: #fee2e2;
        color: #991b1b;
      }
      html[dir="rtl"] body {
        text-align: right;
      }
      html[dir="rtl"] .shell {
        grid-template-columns: 1fr 280px;
      }
      html[dir="rtl"] .sidebar {
        order: 2;
        box-shadow: -6px 0 24px rgba(7, 94, 84, 0.18);
      }
      html[dir="rtl"] .content {
        order: 1;
      }
      html[dir="rtl"] .lang-switcher {
        justify-content: flex-end;
      }
      html[dir="rtl"] nav a,
      html[dir="rtl"] nav button {
        text-align: right;
      }
      html[dir="rtl"] th,
      html[dir="rtl"] td {
        text-align: right;
      }
      html[dir="rtl"] .actions {
        justify-content: flex-end;
      }
      html[dir="rtl"] .section-tabs {
        justify-content: flex-end;
      }
      html[dir="rtl"] .bubble.inbound {
        justify-self: end;
      }
      html[dir="rtl"] .bubble.outbound {
        justify-self: start;
      }
      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .grid-4,
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .sidebar {
          padding: 14px 12px;
          box-shadow: 0 6px 24px rgba(7, 94, 84, 0.18);
        }
        .brand {
          margin-bottom: 12px;
        }
        .hotel-card {
          margin-bottom: 12px;
        }
        nav {
          flex-direction: row;
          overflow-x: auto;
          gap: 8px;
          padding-bottom: 4px;
        }
        nav a,
        nav button {
          white-space: nowrap;
          flex: 0 0 auto;
        }
        .content {
          padding: 14px;
        }
        .panel {
          padding: 14px;
          border-radius: 12px;
        }
      }
      @media (max-width: 640px) {
        .brand-logo {
          width: 40px;
          height: 40px;
        }
        .brand h1 {
          font-size: 15px;
        }
        .brand p {
          font-size: 11px;
        }
        .stat p {
          font-size: 20px;
        }
      }
      @media (max-width: 480px) {
        table {
          min-width: 100%;
          border-collapse: separate;
          border-spacing: 0;
        }
        thead {
          display: none;
        }
        tbody tr {
          display: block;
          margin-bottom: 10px;
          padding: 10px;
          border: 1px solid var(--border);
          border-radius: 12px;
          background: #fff;
        }
        tbody td {
          display: block;
          text-align: right;
          border-bottom: 1px dashed var(--border);
          padding: 8px 0;
          min-height: 22px;
        }
        tbody td:last-child {
          border-bottom: 0;
        }
        tbody td::before {
          content: attr(data-label);
          float: left;
          color: var(--muted);
          font-weight: 600;
          text-align: left;
          padding-right: 10px;
        }
        html[dir="rtl"] tbody td {
          text-align: left;
        }
        html[dir="rtl"] tbody td::before {
          float: right;
          text-align: right;
          padding-right: 0;
          padding-left: 10px;
        }
        tbody th {
          display: block;
          border-bottom: 0;
          padding: 0 0 4px;
          color: var(--muted);
          font-size: 12px;
          font-weight: 600;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-logo">WS</div>
          <div>
            <h1>{{adminTitle}}</h1>
            <p>{{brandTagline}}</p>
          </div>
        </div>
        <div class="lang-switcher">{{langSwitcher}}</div>
        <div class="hotel-card">
          <strong>{{hotelName}}</strong>
          <span>{{hotelSign}}</span>
        </div>
        <nav class="sidebar-nav">{{navLinks}}</nav>
        <div class="sidebar-logout">{{logoutAction}}</div>
      </aside>
      <main class="content">
        <div class="top-subnav">{{sectionTabs}}</div>
        <section class="panel">{{content}}</section>
      </main>
    </div>
    <script>
      (function () {
        const cookieName = "chatastay_lang";
        const query = new URLSearchParams(window.location.search);
        const queryLang = query.get("lang");
        if (queryLang === "en" || queryLang === "ar") {
          document.cookie = `${cookieName}=${queryLang}; Path=/; Max-Age=31536000; SameSite=Lax`;
          query.delete("lang");
          const next = `${window.location.pathname}${query.toString() ? `?${query.toString()}` : ""}${window.location.hash}`;
          window.location.replace(next);
          return;
        }

        const cookieMatch = document.cookie.match(new RegExp(`(?:^|; )${cookieName}=([^;]+)`));
        const lang = cookieMatch?.[1] === "ar" ? "ar" : "en";
        document.documentElement.setAttribute("lang", lang);
        document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

        document.querySelectorAll("[data-lang-link]").forEach((link) => {
          if (link.getAttribute("data-lang-link") === lang) {
            link.classList.add("active");
          }
        });

        const normalizePath = (href) => {
          if (!href) return "";
          try {
            const u = new URL(href, window.location.origin);
            return u.pathname.replace(/\/+$/, "") || "/";
          } catch {
            return "";
          }
        };
        const currentPath = (window.location.pathname || "/").replace(/\/+$/, "") || "/";
        const groupByPath = (path) => {
          if (path === "/admin/profile") return "dashboard";
          if (
            path.startsWith("/admin/users") ||
            path.startsWith("/admin/subscription") ||
            path.startsWith("/admin/billing") ||
            path.startsWith("/admin/integrations") ||
            path.startsWith("/admin/setup")
          )
            return "account";
          if (
            path.startsWith("/admin/reports") ||
            path.startsWith("/admin/management-kpi") ||
            path.startsWith("/admin/daily-digest") ||
            path.startsWith("/admin/ai-analytics") ||
            path.startsWith("/admin/booking-funnel") ||
            path.startsWith("/admin/routing-health")
          )
            return "insights";
          if (
            path.startsWith("/admin/fb") ||
            path.startsWith("/admin/restaurant-ops") ||
            path.startsWith("/admin/outlet-dashboard") ||
            path.startsWith("/admin/outlet-orders")
          )
            return "fb";
          if (path.startsWith("/admin/conversations") || path.startsWith("/admin/campaigns")) return "comms";
          if (
            path.startsWith("/admin/bookings") ||
            path.startsWith("/admin/calendar") ||
            path.startsWith("/admin/inventory") ||
            path.startsWith("/admin/offers") ||
            path.startsWith("/admin/guests") ||
            path.startsWith("/admin/rooms")
          )
            return "reservations";
          if (
            path.startsWith("/admin/room-board") ||
            path.startsWith("/admin/housekeeping") ||
            path.startsWith("/admin/handover-sheet") ||
            path.startsWith("/admin/front-desk") ||
            path.startsWith("/admin/shifts") ||
            path.startsWith("/admin/shift-close") ||
            path.startsWith("/admin/shift-report")
          )
            return "rooms";
          return "dashboard";
        };
        const activeGroup = groupByPath(currentPath);

        document.querySelectorAll(".top-level-link").forEach((link) => {
          if (link.getAttribute("data-top-group") === activeGroup) {
            link.classList.add("top-level-active");
          }
        });

        const sections = Array.from(document.querySelectorAll(".section-tabs"));
        sections.forEach((section) => {
          if (section.getAttribute("data-section") === activeGroup) {
            section.classList.add("active");
            section.querySelectorAll("a").forEach((subLink) => {
              if (normalizePath(subLink.getAttribute("href")) === currentPath) {
                subLink.classList.add("active-link");
              }
            });
          }
        });

        const tables = document.querySelectorAll("table");
        tables.forEach((table) => {
          const headerCells = Array.from(table.querySelectorAll("thead th")).map((th) =>
            th.textContent ? th.textContent.trim() : ""
          );

          table.querySelectorAll("tbody tr").forEach((row) => {
            const rowHeader = row.querySelector("th");
            const rowHeaderText = rowHeader?.textContent?.trim() ?? "";
            const dataCells = Array.from(row.querySelectorAll("td"));

            dataCells.forEach((cell, index) => {
              if (cell.hasAttribute("data-label") || Number(cell.getAttribute("colspan") ?? "1") > 1) {
                return;
              }
              const fallback = rowHeaderText || `Field ${index + 1}`;
              const label = headerCells[index] || fallback;
              cell.setAttribute("data-label", label);
            });
          });
        });

        if (lang === "ar") {
          const dictionary = {
            "ChatAstay Admin": "تشاتا ستاي - لوحة التحكم",
            "WhatsApp-first booking ops": "إدارة الحجوزات عبر واتساب",
            "Dashboard": "لوحة التحكم",
            "Reservations": "الحجوزات",
            "Rooms": "الغرف",
            "F&B": "المطاعم والمشروبات",
            "Messages": "الرسائل",
            "Insights": "الرؤى",
            "Overview": "نظرة عامة",
            "Property overview": "نظرة عامة على العقار",
            "Hotel Profile": "ملف الفندق",
            "Room Board": "لوحة الغرف",
            "Room board": "لوحة الغرف",
            "Inventory": "المخزون",
            "Availability": "التوفر",
            "Rates": "الأسعار",
            "Bookings": "الحجوزات",
            "Calendar": "التقويم",
            "Conversations": "المحادثات",
            "Guest conversations": "محادثات الضيوف",
            "Campaigns": "الحملات",
            "Users & permissions": "المستخدمون والصلاحيات",
            "Users": "المستخدمون",
            "Subscription": "الاشتراك",
            "Billing": "الفواتير",
            "Integrations": "التكاملات",
            "Settings": "الإعدادات",
            "Handover": "تسليم المناوبة",
            "Check-in": "تسجيل الوصول",
            "Check-out": "تسجيل المغادرة",
            "Maintenance": "الصيانة",
            "Shift close": "إقفال المناوبة",
            "Outlet board": "لوحة المنافذ",
            "Outlet orders": "طلبات المنافذ",
            "Restaurant operations guide": "دليل تشغيل المطعم",
            "KPI dashboard": "لوحة مؤشرات الأداء",
            "AI analytics": "تحليلات الذكاء الاصطناعي",
            "Booking funnel": "قمع الحجز",
            "Routing health": "صحة التوجيه",
            "F&B master": "القائمة الرئيسية للمطاعم والمشروبات",
            "Housekeeping": "التدبير المنزلي",
            "Daily digest": "الملخص اليومي",
            "Reports": "التقارير",
            "Logout": "تسجيل الخروج",
            "Login": "تسجيل الدخول",
            "Admin Login": "تسجيل دخول الإدارة",
            "Sign In": "دخول",
            "Email": "البريد الإلكتروني",
            "Password": "كلمة المرور",
            "Rooms & Pricing": "الغرف والأسعار",
            "Inventory Control": "إدارة المخزون",
            "Room Availability": "توفر الغرف",
            "Reports & Bookings": "التقارير والحجوزات",

            "Actions": "الإجراءات",

            "Check room availability": "التحقق من توفر الغرف",
            "Update State": "تحديث الحالة",
            "Update Booking Status": "تحديث حالة الحجز",
            "Update Payment Status": "تحديث حالة الدفع",
            "Guest": "النزيل",
            "Room Type": "نوع الغرفة",
            "Stay Dates": "تواريخ الإقامة",
            "Total": "الإجمالي",
            "Reserved": "محجوز",
            "Closed": "مغلق",
            "Status": "الحالة",
            "High season rates": "أسعار الموسم العالي",
            "Low season rates": "أسعار الموسم المنخفض",
            "Apply season pricing": "تطبيق أسعار الموسم",
            "Apply Offer Scheme": "تطبيق عرض",
            "Tour Operator (15% off)": "شركة سياحة (خصم 15%)",
            "Weekday Saver (10% off)": "خصم أيام الأسبوع (10%)",
            "Flash 24h Offer (20% off)": "عرض 24 ساعة (20%)",
            "Open Calendar View": "فتح التقويم",
            "Open Inventory by Date": "فتح مخزون حسب التاريخ",
            "See Booking Report": "عرض تقرير الحجوزات",
            "Open Booking Reports": "فتح تقارير الحجوزات",
            "Manage Inventory": "إدارة المخزون",
            "Update Prices": "تحديث الأسعار",
            "Open Room Calendar": "فتح تقويم الغرف"
          };

          const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          const textNodes = [];
          while (walker.nextNode()) {
            textNodes.push(walker.currentNode);
          }
          textNodes.forEach((node) => {
            if (!node.nodeValue) return;
            const raw = node.nodeValue;
            const trimmed = raw.trim();
            if (!trimmed) return;
            const translated = dictionary[trimmed];
            if (translated) {
              node.nodeValue = raw.replace(trimmed, translated);
            }
          });
        }
      })();
    </script>
    <div id="adminToastStack" class="admin-toast-stack" aria-live="polite"></div>
    {{extraScripts}}
  </body>
