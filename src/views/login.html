<div class="login-card-shell">
  <div class="login-card">
    <h1 class="login-card-title">Sign in to ChatAStay</h1>
    <p class="muted login-card-sub">Al Ashkhara Beach Resort — one portal for management and operations.</p>

    <div class="login-segment" role="tablist" aria-label="Choose account type">
      <button
        type="button"
        class="login-segment-btn is-active"
        id="loginTabMgmt"
        role="tab"
        aria-selected="true"
        aria-controls="loginPanelMgmt"
        tabindex="0"
        data-login-mode="management"
      >
        Admin &amp; Management
      </button>
      <button
        type="button"
        class="login-segment-btn"
        id="loginTabStaff"
        role="tab"
        aria-selected="false"
        aria-controls="loginPanelStaff"
        tabindex="-1"
        data-login-mode="staff"
      >
        Hotel Staff
      </button>
    </div>

    <p class="login-mode-hint" id="loginModeHint" aria-live="polite">
      Access dashboards, reports, and full hotel controls
    </p>

    <div id="loginPanelMgmt" class="login-panel" role="tabpanel" aria-labelledby="loginTabMgmt">
      <form method="post" action="/admin/login" id="loginFormMgmt">
        <fieldset class="login-fieldset" id="loginFieldsetMgmt">
          <label class="login-label" for="loginEmail">Email</label>
          <input
            class="login-input"
            id="loginEmail"
            type="text"
            name="email"
            required
            autocomplete="username"
            inputmode="email"
            placeholder="you@hotel.com"
          />
          <label class="login-label" for="loginPassword">Password</label>
          <input
            class="login-input"
            id="loginPassword"
            type="password"
            name="password"
            required
            autocomplete="current-password"
          />
          <button class="login-btn login-btn--primary" type="submit" id="loginBtnMgmt">
            Continue to Dashboard
          </button>
          <p class="login-forgot muted"><a class="inline-link" href="/admin/forgot-password">Forgot password?</a></p>
        </fieldset>
      </form>
    </div>

    <div id="loginPanelStaff" class="login-panel" role="tabpanel" aria-labelledby="loginTabStaff" hidden>
      <form method="post" action="/auth/staff-login" id="loginFormStaff">
        <fieldset class="login-fieldset" id="loginFieldsetStaff" disabled>
          <label class="login-label" for="loginStaffUser">Staff ID or Username</label>
          <input class="login-input" id="loginStaffUser" type="text" name="username" required autocomplete="username" />
          <label class="login-label" for="loginStaffPin">4-digit PIN</label>
          <input
            class="login-input"
            id="loginStaffPin"
            type="password"
            name="pin"
            required
            autocomplete="current-password"
            inputmode="numeric"
            minlength="4"
            maxlength="12"
            placeholder="••••"
          />
          <button class="login-btn login-btn--staff" type="submit" id="loginBtnStaff">Access Workspace</button>
        </fieldset>
      </form>
    </div>
    {{LOGIN_DEMO_SECTION}}
  </div>
</div>

<style>
  .login-card-shell {
    max-width: 440px;
    margin: 0 auto;
  }
  .login-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 28px 24px 24px;
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.07);
  }
  .login-card-title {
    margin: 0 0 8px;
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #0f172a;
  }
  .login-card-sub {
    margin: 0 0 20px;
    font-size: 14px;
    line-height: 1.45;
  }
  .login-segment {
    display: flex;
    gap: 8px;
    padding: 0;
    border-radius: 12px;
    background: transparent;
    margin-bottom: 8px;
  }
  .login-segment-btn {
    flex: 1;
    border: 1px solid #cbd5e1;
    background: #fff;
    padding: 10px 12px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    color: #475569;
    transition:
      background 0.22s ease,
      color 0.22s ease,
      border-color 0.22s ease,
      box-shadow 0.22s ease,
      transform 0.18s ease;
  }
  .login-segment-btn:hover {
    color: #0f172a;
    border-color: #94a3b8;
    background: #f8fafc;
  }
  .login-segment-btn.is-active {
    background: #0f766e;
    color: #fff;
    border-color: #0f766e;
    box-shadow: 0 4px 14px rgba(15, 118, 110, 0.28);
  }
  .login-segment-btn.is-active:hover {
    color: #fff;
    border-color: #0d9488;
    background: #0d9488;
  }
  .login-segment-btn:focus-visible {
    outline: 2px solid #0f766e;
    outline-offset: 2px;
  }
  .login-mode-hint {
    margin: 0 0 18px;
    font-size: 13px;
    line-height: 1.5;
    color: #64748b;
    min-height: 2.75em;
  }
  .login-panel[hidden] {
    display: none !important;
  }
  .login-fieldset {
    border: 0;
    margin: 0;
    padding: 0;
    min-width: 0;
  }
  .login-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
  }
  .login-input {
    width: 100%;
    padding: 11px 12px;
    margin-bottom: 14px;
    border: 1px solid #d8dee6;
    border-radius: 10px;
    font-size: 15px;
    box-sizing: border-box;
  }
  .login-input:focus {
    border-color: #0f766e;
    outline: 0;
    box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
  }
  .login-btn {
    width: 100%;
    padding: 12px 16px;
    border: 0;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s ease, filter 0.15s ease, transform 0.12s ease;
  }
  .login-btn:disabled {
    cursor: not-allowed;
    opacity: 0.72;
  }
  .login-btn--primary {
    background: #25d366;
    color: #083d2d;
  }
  .login-btn--primary:hover:not(:disabled) {
    filter: brightness(0.97);
  }
  .login-btn--staff {
    background: #0b6e6e;
    color: #fff;
  }
  .login-btn--staff:hover:not(:disabled) {
    filter: brightness(1.05);
  }
  .login-btn.is-loading {
    position: relative;
  }
  .login-forgot {
    margin: 14px 0 0;
    font-size: 13px;
  }
  .login-demo-details {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #e2e8f0;
    font-size: 13px;
  }
  .login-demo-details summary {
    cursor: pointer;
    color: #64748b;
    font-weight: 600;
    list-style-position: outside;
    user-select: none;
  }
  .login-demo-details summary:focus-visible {
    outline: 2px solid #0f766e;
    outline-offset: 2px;
    border-radius: 4px;
  }
  .login-demo-details .login-demo-body {
    margin-top: 10px;
    color: #475569;
    line-height: 1.55;
  }
  .login-demo-details code {
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>

<script>
  (function () {
    var STORAGE_KEY = "chatastay_login_mode";
    var tabMgmt = document.getElementById("loginTabMgmt");
    var tabStaff = document.getElementById("loginTabStaff");
    var panelMgmt = document.getElementById("loginPanelMgmt");
    var panelStaff = document.getElementById("loginPanelStaff");
    var fsMgmt = document.getElementById("loginFieldsetMgmt");
    var fsStaff = document.getElementById("loginFieldsetStaff");
    var hint = document.getElementById("loginModeHint");
    var formMgmt = document.getElementById("loginFormMgmt");
    var formStaff = document.getElementById("loginFormStaff");
    var btnMgmt = document.getElementById("loginBtnMgmt");
    var btnStaff = document.getElementById("loginBtnStaff");
    if (!tabMgmt || !tabStaff || !panelMgmt || !panelStaff || !fsMgmt || !fsStaff || !hint) return;

    var HINT_MGMT = "Access dashboards, reports, and full hotel controls";
    var HINT_STAFF = "Quick access for front desk, housekeeping, and operations";
    var LABEL_MGMT_LOADING = "Signing in…";
    var LABEL_STAFF_LOADING = "Opening workspace…";
    var LABEL_MGMT_DEFAULT = "Continue to Dashboard";
    var LABEL_STAFF_DEFAULT = "Access Workspace";

    function focusMode(mode) {
      requestAnimationFrame(function () {
        if (mode === "staff") {
          var u = document.getElementById("loginStaffUser");
          if (u && !u.disabled) u.focus({ preventScroll: true });
        } else {
          var e = document.getElementById("loginEmail");
          if (e && !e.disabled) e.focus({ preventScroll: true });
        }
      });
    }

    function setMode(mode) {
      var isStaff = mode === "staff";
      tabMgmt.classList.toggle("is-active", !isStaff);
      tabStaff.classList.toggle("is-active", isStaff);
      tabMgmt.setAttribute("aria-selected", isStaff ? "false" : "true");
      tabStaff.setAttribute("aria-selected", isStaff ? "true" : "false");
      tabMgmt.setAttribute("tabindex", isStaff ? "-1" : "0");
      tabStaff.setAttribute("tabindex", isStaff ? "0" : "-1");
      panelMgmt.hidden = isStaff;
      panelStaff.hidden = !isStaff;
      fsMgmt.disabled = isStaff;
      fsStaff.disabled = !isStaff;
      hint.textContent = isStaff ? HINT_STAFF : HINT_MGMT;
      try {
        localStorage.setItem(STORAGE_KEY, mode);
      } catch (e) {}
      focusMode(mode);
    }

    function wireSubmitLoading(form, button, loadingLabel, defaultLabel) {
      if (!form || !button) return;
      form.addEventListener("submit", function () {
        if (button.disabled) return;
        button.disabled = true;
        button.setAttribute("aria-busy", "true");
        button.classList.add("is-loading");
        button.textContent = loadingLabel;
        var fs = form.querySelector("fieldset");
        if (fs) fs.setAttribute("aria-busy", "true");
      });
      window.addEventListener("pageshow", function (ev) {
        if (ev.persisted) {
          button.disabled = false;
          button.removeAttribute("aria-busy");
          button.classList.remove("is-loading");
          button.textContent = defaultLabel;
          var fs2 = form.querySelector("fieldset");
          if (fs2) fs2.removeAttribute("aria-busy");
        }
      });
    }

    wireSubmitLoading(formMgmt, btnMgmt, LABEL_MGMT_LOADING, LABEL_MGMT_DEFAULT);
    wireSubmitLoading(formStaff, btnStaff, LABEL_STAFF_LOADING, LABEL_STAFF_DEFAULT);

    var initial = "management";
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved === "staff") initial = "staff";
    } catch (e) {}
    setMode(initial);

    tabMgmt.addEventListener("click", function () {
      setMode("management");
    });
    tabStaff.addEventListener("click", function () {
      setMode("staff");
    });

    tabMgmt.addEventListener("keydown", function (ev) {
      if (ev.key === "ArrowRight" || ev.key === "ArrowDown") {
        ev.preventDefault();
        tabStaff.focus();
        setMode("staff");
      }
    });
    tabStaff.addEventListener("keydown", function (ev) {
      if (ev.key === "ArrowLeft" || ev.key === "ArrowUp") {
        ev.preventDefault();
        tabMgmt.focus();
        setMode("management");
      }
    });
  })();
</script>
