<h2>Admin Login</h2>
<p class="muted">Sign in to manage Al Ashkhara Beach Resort bookings from WhatsApp.</p>

<form method="post" action="/admin/login" style="max-width: 420px">
  <label for="email">Email</label><br />
  <input
    id="email"
    type="email"
    name="email"
    required
    style="width: 100%; padding: 10px; margin-top: 6px; margin-bottom: 12px; border: 1px solid #d8dee6; border-radius: 10px"
  />

  <label for="password">Password</label><br />
  <input
    id="password"
    type="password"
    name="password"
    required
    style="width: 100%; padding: 10px; margin-top: 6px; margin-bottom: 12px; border: 1px solid #d8dee6; border-radius: 10px"
  />

  <button
    type="submit"
    style="width: 100%; padding: 10px 14px; border: 0; border-radius: 10px; background: #25d366; color: #083d2d; font-weight: 700"
  >
    Sign In
  </button>
</form>

<p class="muted" style="margin-top: 12px"><a href="/admin/forgot-password">Forgot Password?</a></p>
<p class="muted" style="margin-top: 6px">Demo: admin@chatastay.local / admin123</p>
