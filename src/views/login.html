<div class="login-card-shell">
  <div class="login-card">
    <h1 class="login-card-title">Hotel Extranet Sign In</h1>
    <p class="muted login-card-sub">Al Ashkhara Beach Resort — one portal for management and operations.</p>

    <p class="login-mode-hint" id="loginModeHint" aria-live="polite">
      Enter your hotel ID or staff username, then your password/PIN. Your workspace opens automatically based on your role.
    </p>

    <div id="loginPanelUnified" class="login-panel">
      <form method="post" action="/admin/login" id="loginFormUnified">
        <fieldset class="login-fieldset" id="loginFieldsetUnified">
          <label class="login-label" for="loginId">Hotel ID / username</label>
          <input
            class="login-input"
            id="loginId"
            type="text"
            name="loginId"
            required
            autocomplete="username"
            value="{{LOGIN_ID_VALUE}}"
            placeholder="1 or jaweed"
          />
          <label class="login-label" for="loginPassword">Password or PIN</label>
          <input
            class="login-input"
            id="loginPassword"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            minlength="4"
            maxlength="128"
          />
          <button class="login-btn login-btn--primary" type="submit" id="loginBtnUnified">
            Continue to Workspace
          </button>
          <p class="login-forgot muted"><a class="inline-link" href="/admin/forgot-password">Forgot password?</a></p>
        </fieldset>
      </form>
    </div>
    {{LOGIN_DEMO_SECTION}}
  </div>
</div>

<style>
  .login-card-shell {
    max-width: 440px;
    margin: 0 auto;
  }
  .login-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 28px 24px 24px;
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.07);
  }
  .login-card-title {
    margin: 0 0 8px;
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #0f172a;
  }
  .login-card-sub {
    margin: 0 0 20px;
    font-size: 14px;
    line-height: 1.45;
  }
  .login-mode-hint {
    margin: 0 0 18px;
    font-size: 13px;
    line-height: 1.5;
    color: #64748b;
    min-height: 2.75em;
  }
  .login-panel[hidden] {
    display: none !important;
  }
  .login-fieldset {
    border: 0;
    margin: 0;
    padding: 0;
    min-width: 0;
  }
  .login-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
  }
  .login-input {
    width: 100%;
    padding: 11px 12px;
    margin-bottom: 14px;
    border: 1px solid #d8dee6;
    border-radius: 10px;
    font-size: 15px;
    box-sizing: border-box;
  }
  .login-input:focus {
    border-color: #0f766e;
    outline: 0;
    box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
  }
  .login-btn {
    width: 100%;
    padding: 12px 16px;
    border: 0;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s ease, filter 0.15s ease, transform 0.12s ease;
  }
  .login-btn:disabled {
    cursor: not-allowed;
    opacity: 0.72;
  }
  .login-btn--primary {
    background: #25d366;
    color: #083d2d;
  }
  .login-btn--primary:hover:not(:disabled) {
    filter: brightness(0.97);
  }
  .login-btn--staff {
    background: #0b6e6e;
    color: #fff;
  }
  .login-btn--staff:hover:not(:disabled) {
    filter: brightness(1.05);
  }
  .login-btn.is-loading {
    position: relative;
  }
  .login-forgot {
    margin: 14px 0 0;
    font-size: 13px;
  }
  .login-demo-details {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #e2e8f0;
    font-size: 13px;
  }
  .login-demo-details summary {
    cursor: pointer;
    color: #64748b;
    font-weight: 600;
    list-style-position: outside;
    user-select: none;
  }
  .login-demo-details summary:focus-visible {
    outline: 2px solid #0f766e;
    outline-offset: 2px;
    border-radius: 4px;
  }
  .login-demo-details .login-demo-body {
    margin-top: 10px;
    color: #475569;
    line-height: 1.55;
  }
  .login-demo-details code {
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>

<script>
  (function () {
    var form = document.getElementById("loginFormUnified");
    var btn = document.getElementById("loginBtnUnified");
    var LABEL_MGMT_LOADING = "Signing in…";
    var LABEL_MGMT_DEFAULT = "Continue to Workspace";

    function wireSubmitLoading(form, button, loadingLabel, defaultLabel) {
      if (!form || !button) return;
      function resetLoadingState() {
        button.disabled = false;
        button.removeAttribute("aria-busy");
        button.classList.remove("is-loading");
        button.textContent = defaultLabel;
        var fs2 = form.querySelector("fieldset");
        if (fs2) fs2.removeAttribute("aria-busy");
      }
      form.addEventListener("submit", function () {
        if (button.disabled) return;
        button.disabled = true;
        button.setAttribute("aria-busy", "true");
        button.classList.add("is-loading");
        button.textContent = loadingLabel;
        var fs = form.querySelector("fieldset");
        if (fs) fs.setAttribute("aria-busy", "true");
        window.setTimeout(resetLoadingState, 12000);
      });
      window.addEventListener("pageshow", function (ev) {
        resetLoadingState();
      });
    }

    wireSubmitLoading(form, btn, LABEL_MGMT_LOADING, LABEL_MGMT_DEFAULT);
    requestAnimationFrame(function () {
      var e = document.getElementById("loginId");
      if (e && !e.disabled) e.focus({ preventScroll: true });
    });
  })();
</script>
