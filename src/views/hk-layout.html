<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{pageTitle}} · Housekeeping</title>
    <style>
      :root {
        --brand: #075e54;
        --accent: #25d366;
        --bg: #e8f5f0;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #5f6b7a;
        --border: #d8dee6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .shell {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 100vh;
      }
      aside {
        background: linear-gradient(180deg, #063d36 0%, var(--brand) 100%);
        color: #fff;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .brand {
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.02em;
      }
      .brand span {
        display: block;
        font-size: 11px;
        font-weight: 500;
        opacity: 0.88;
        margin-top: 4px;
      }
      aside nav {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }
      aside nav a {
        text-decoration: none;
        color: #fff;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        font-size: 14px;
        font-weight: 600;
      }
      aside nav a:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      aside nav a.active {
        background: var(--accent);
        color: #063d36;
        border-color: transparent;
      }
      .logout {
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }
      .logout button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .logout button:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      main {
        padding: 20px 22px;
        min-width: 0;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
      }
      h1,
      h2 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
      }
      @media (max-width: 720px) {
        .shell {
          grid-template-columns: 1fr;
        }
        aside {
          flex-direction: row;
          flex-wrap: wrap;
          align-items: center;
        }
        aside nav {
          flex-direction: row;
          flex-wrap: wrap;
          width: 100%;
        }
        aside nav a {
          flex: 1 1 auto;
          text-align: center;
        }
        .logout {
          width: 100%;
          margin-top: 0;
          padding-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <div class="brand">ChatAstay <span>Housekeeping</span></div>
        <nav>{{navLinks}}</nav>
        <div class="logout">{{logoutForm}}</div>
      </aside>
      <main>
        <div class="panel">{{content}}</div>
      </main>
    </div>
  </body>
</html>
