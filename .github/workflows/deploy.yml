name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd /var/www/chatastay

            # Preserve runtime-managed files that the server writes to so a
            # deploy can never destroy live data, then clean any local diffs
            # so `git pull --ff-only` is guaranteed to succeed.
            RUNTIME_FILES=(admin-user-permissions.json)
            BACKUP_DIR="$(mktemp -d)"
            for f in "${RUNTIME_FILES[@]}"; do
              if [ -f "$f" ]; then
                cp -a "$f" "$BACKUP_DIR/$(basename "$f")"
              fi
              git checkout -- "$f" 2>/dev/null || true
            done

            git pull --ff-only origin main

            # Restore runtime files (these are .gitignored after the
            # admin-user-permissions untrack commit, so the restore is a no-op
            # for git but keeps live data intact).
            for f in "${RUNTIME_FILES[@]}"; do
              if [ -f "$BACKUP_DIR/$(basename "$f")" ]; then
                cp -a "$BACKUP_DIR/$(basename "$f")" "$f"
              fi
            done
            rm -rf "$BACKUP_DIR"

            npm run deploy:production
