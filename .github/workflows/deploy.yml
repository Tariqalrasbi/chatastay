name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd /var/www/chatastay

            # Files the production server writes to at runtime. Back them up
            # before syncing so a deploy can never destroy live data, then
            # restore them on top of the freshly-synced tree.
            RUNTIME_FILES=(admin-user-permissions.json)
            BACKUP_DIR="$(mktemp -d)"
            trap 'rm -rf "$BACKUP_DIR"' EXIT

            for f in "${RUNTIME_FILES[@]}"; do
              if [ -f "$f" ]; then
                echo "[deploy] backing up runtime file: $f"
                cp -a "$f" "$BACKUP_DIR/$(basename "$f")"
              fi
            done

            # Force the working tree to match origin/main exactly. This avoids
            # any "would be overwritten by merge" errors caused by runtime
            # writes to tracked files. Untracked files (including any
            # restored runtime files below) are not affected by reset --hard.
            echo "[deploy] fetching origin/main"
            git fetch origin main
            echo "[deploy] hard-resetting working tree to origin/main"
            git reset --hard origin/main

            for f in "${RUNTIME_FILES[@]}"; do
              if [ -f "$BACKUP_DIR/$(basename "$f")" ]; then
                echo "[deploy] restoring runtime file: $f"
                cp -a "$BACKUP_DIR/$(basename "$f")" "$f"
              fi
            done

            npm run deploy:production
